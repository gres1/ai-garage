<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Garage</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23ff5a1f'/%3E%3Cpath d='M9 21a7 7 0 1 1 14 0' fill='none' stroke='%23fff' stroke-width='2.6' stroke-linecap='round'/%3E%3Cline x1='16' y1='16' x2='20.5' y2='11.5' stroke='%23fff' stroke-width='2.6' stroke-linecap='round'/%3E%3C/svg%3E"/>
<style>
  :root{
    --bg:#eef0f5; --bg2:#e7e9f0; --card:#ffffff; --txt:#16161a; --mut:#5c5c66; --faint:#8a8a93;
    --line:rgba(20,20,40,.08); --blue:#0a84ff; --blue-d:#0070e0; --green:#30d158; --red:#ff453a;
    --accent:#ff5a1f; --accent-d:#ec4608;
    --glass:rgba(255,255,255,.58); --glass-strong:rgba(255,255,255,.72); --glass-brd:rgba(255,255,255,.72);
    --ic-stop:#ff453a;
    --shadow:0 1px 1px rgba(20,20,45,.04), 0 12px 34px -14px rgba(25,25,60,.22);
    --shadow-h:0 2px 4px rgba(20,20,45,.06), 0 30px 60px -18px rgba(25,25,70,.34);
    --r:20px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    min-height:100vh; position:relative;
    background:
      radial-gradient(820px 560px at 9% 3%, rgba(255,120,60,.13), transparent 55%),
      radial-gradient(820px 560px at 93% 1%, rgba(10,132,255,.12), transparent 55%),
      radial-gradient(900px 720px at 78% 110%, rgba(120,86,255,.10), transparent 55%),
      linear-gradient(180deg,#f5f6fa,#e8eaf1);
    background-attachment:fixed;
    color:var(--txt); padding:30px 26px 80px;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  /* живой ambient-glow за курсором (как pletor) */
  body::before{ content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(440px circle at var(--gx,50%) var(--gy,-10%), rgba(255,90,31,.07), transparent 62%); }
  header, .grid, #disc-wrap, #platwarn, #selftun{ position:relative; z-index:1; }
  .rounded{ font-family:ui-rounded,-apple-system,"SF Pro Rounded",sans-serif; }
  header{ max-width:1180px; margin:0 auto 24px; display:flex; align-items:center; gap:20px; flex-wrap:wrap;
    background:var(--glass-strong); backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-brd); border-radius:24px; padding:18px 22px; box-shadow:var(--shadow); }
  h1{ font-size:28px; letter-spacing:-.022em; margin:0; font-weight:700; line-height:1.1; }
  .sub{ color:var(--faint); font-size:13px; margin-top:3px; }
  .ring{ position:relative; width:80px; height:80px; flex:0 0 auto; }
  .ring svg{ transform:rotate(-90deg); }
  #arc{ transition:stroke-dashoffset .7s cubic-bezier(.2,.7,.2,1); }
  .ring .num{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring .num b{ font-size:21px; line-height:1; letter-spacing:-.03em; }
  .ring .num span{ font-size:10px; color:var(--mut); margin-top:2px; }
  .legend{ display:flex; gap:14px; margin-top:7px; }
  .legend div{ font-size:13px; color:var(--mut); display:flex; align-items:center; gap:6px; }
  .ld{ width:9px; height:9px; border-radius:50%; }
  .spacer{ flex:1; }
  .ctl{ display:flex; align-items:center; gap:8px; }
  .field{ border:1px solid var(--line); background:rgba(255,255,255,.75); backdrop-filter:blur(8px);
    border-radius:980px; padding:9px 14px; font-size:14px; color:var(--txt); outline:none; transition:.2s; font-family:inherit; }
  .field:focus{ border-color:var(--accent); box-shadow:0 0 0 4px rgba(255,90,31,.14); }
  .search{ position:relative; }
  .search input{ padding-left:36px; width:210px; }
  .search input:focus{ width:240px; }
  .search svg{ position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.4; }
  select.field{ cursor:pointer; padding-right:30px; }
  .btn-add{ background:var(--accent); color:#fff; border:none; border-radius:980px; padding:10px 16px;
    font-size:14px; font-weight:600; cursor:pointer; box-shadow:0 2px 10px rgba(255,90,31,.32); font-family:inherit; transition:.15s; }
  .btn-add:hover{ background:var(--accent-d); transform:translateY(-1px); }
  .pausebtn{ border:1px solid var(--line); background:rgba(255,255,255,.6); border-radius:980px;
    padding:9px 14px; font-size:13px; cursor:pointer; color:var(--mut); font-family:inherit; }
  .pausebtn:hover{ border-color:var(--accent); color:var(--accent); }

  .grid{ max-width:1180px; margin:0 auto; display:grid; gap:20px; align-items:start;   /* авто-высота */
         grid-template-columns:repeat(auto-fill,minmax(335px,1fr)); perspective:1400px; }
  .card{ position:relative; z-index:1; background:var(--glass); backdrop-filter:blur(22px) saturate(185%);
    -webkit-backdrop-filter:blur(22px) saturate(185%); border:1px solid var(--glass-brd); border-radius:var(--r);
    padding:17px 17px 15px; box-shadow:var(--shadow); overflow:hidden; transform-style:preserve-3d;
    transform:translateY(var(--lift,0)) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));
    transition:transform .18s cubic-bezier(.2,.7,.2,1), box-shadow .3s ease; }
  .card:hover{ --lift:-6px; box-shadow:var(--shadow-h); }
  .card.dragging{ opacity:.4; cursor:grabbing; }
  /* спотлайт-блик, следующий за курсором (живой эффект, как pletor) */
  .card::after{ content:""; position:absolute; inset:0; z-index:0; pointer-events:none; opacity:0; transition:opacity .35s;
    background:radial-gradient(260px circle at var(--mx,50%) var(--my,50%), rgba(255,90,31,.13), transparent 46%); }
  .card:hover::after{ opacity:1; }
  .card>*{ position:relative; z-index:1; }
  .card::before{ content:""; position:absolute; left:0; top:0; right:0; height:3px; background:var(--faint); opacity:.35; z-index:2; }
  .card.up::before{ background:linear-gradient(90deg,var(--green),#7be39a); opacity:.9; }
  .card.down::before{ background:linear-gradient(90deg,var(--red),#ff8a80); opacity:.9; }
  .top{ display:flex; align-items:center; gap:10px; }
  .pulse{ width:12px; height:12px; border-radius:50%; flex:0 0 auto; background:#c7c7cc; position:relative; }
  .pulse.up{ background:var(--green); }
  .pulse.down{ background:var(--red); }
  .pulse.up::after{ content:""; position:absolute; inset:-5px; border-radius:50%; border:2px solid var(--green);
    opacity:.5; animation:ring 2s ease-out infinite; }
  @keyframes ring{ 0%{ transform:scale(.6); opacity:.6 } 100%{ transform:scale(1.5); opacity:0 } }
  .name{ font-weight:650; font-size:15.5px; letter-spacing:-.01em; }
  .state{ font-size:11.5px; font-weight:600; padding:3px 9px; border-radius:980px; }
  .state.up{ color:#1a7f37; background:rgba(52,199,89,.14); }
  .state.down{ color:#b3261e; background:rgba(255,59,48,.12); }
  .hostb{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:3px 8px; border-radius:980px; background:var(--bg2); color:var(--mut); flex:0 0 auto; }
  .hostb .ic{ width:12px; height:12px; }
  .card.disc{ border-style:dashed; box-shadow:none; padding:14px 16px; }
  .card.disc:hover{ --lift:-3px; box-shadow:var(--shadow); }
  .card.disc .cmd{ font-weight:600; font-size:14px; } .card.disc .pid{ color:var(--faint); font-size:11px; }
  .thumb .reload{ position:absolute; left:8px; bottom:8px; background:rgba(0,0,0,.62); color:#fff; border:none;
    width:30px; height:30px; border-radius:9px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
    transition:transform .12s ease, background .15s; }
  .thumb .reload:hover{ background:rgba(0,0,0,.82); transform:scale(1.08); }
  .thumb .reload:active{ transform:scale(.9); }
  .thumb .reload .ic{ width:15px; height:15px; }
  .kebab{ border:none; background:transparent; color:var(--faint); cursor:pointer; font-size:17px; padding:2px 4px;
    border-radius:7px; line-height:1; }
  .kebab:hover{ background:var(--bg2); color:var(--txt); }
  .menu{ position:absolute; right:14px; top:42px; background:#fff; border:1px solid var(--line); border-radius:12px;
    box-shadow:var(--shadow-h); padding:5px; z-index:5; display:none; min-width:170px; }
  .menu.open{ display:block; }
  .menu button{ display:block; width:100%; text-align:left; border:none; background:none; padding:8px 10px;
    border-radius:8px; font-size:13px; cursor:pointer; color:var(--txt); font-family:inherit; }
  .menu button:hover{ background:var(--bg2); }
  .menu button.del{ color:var(--red); }
  .note{ color:#48484a; font-size:12.5px; margin:8px 0; line-height:1.5; }
  .urls{ display:flex; flex-direction:column; gap:6px; margin-bottom:11px; }
  .urlrow{ display:flex; align-items:center; gap:6px; }
  .urlrow a{ color:var(--blue); text-decoration:none; font-size:13px; word-break:break-all; flex:1; }
  .urlrow a:hover{ text-decoration:underline; }
  .badge{ font-size:11px; font-weight:600; color:var(--mut); background:var(--bg2); padding:3px 8px; border-radius:980px; flex:0 0 auto; }
  .tag{ font-size:10px; padding:2px 7px; border-radius:6px; background:var(--bg2); color:var(--faint); flex:0 0 auto; }
  .icbtn{ border:none; background:rgba(20,20,45,.06); border-radius:8px; width:28px; height:26px; cursor:pointer;
    font-size:12px; color:var(--mut); flex:0 0 auto; transition:.15s; }
  .icbtn:hover{ background:var(--accent); color:#fff; }
  .row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .btn{ border:none; border-radius:980px; padding:8px 15px; font-size:13px; font-weight:550; cursor:pointer;
    transition:transform .12s ease, background .2s; font-family:inherit; }
  .btn:active{ transform:scale(.95); }
  .btn-primary{ background:var(--accent); color:#fff; box-shadow:0 2px 10px rgba(255,90,31,.32); }
  .btn-primary:hover{ background:var(--accent-d); }
  .btn-soft{ background:rgba(20,20,45,.06); color:var(--txt); } .btn-soft:hover{ background:rgba(20,20,45,.11); }
  .btn-danger{ background:rgba(255,69,58,.12); color:var(--red); } .btn-danger:hover{ background:rgba(255,69,58,.2); }
  .btn-ghost{ background:transparent; color:var(--mut); padding:8px 12px; } .btn-ghost:hover{ color:var(--blue); background:var(--bg2); }
  /* система иконок (SVG, не эмодзи) */
  .ic{ width:15px; height:15px; flex:0 0 auto; display:inline-block; vertical-align:-2px; }
  .btn{ display:inline-flex; align-items:center; gap:6px; }
  .icbtn{ display:inline-flex; align-items:center; justify-content:center; } .icbtn .ic{ width:14px; height:14px; }
  .kebab{ display:inline-flex; align-items:center; } .kebab .ic{ width:17px; height:17px; }
  .menu button{ display:flex; align-items:center; gap:8px; } .menu button .ic{ width:14px; height:14px; }
  .spin{ animation:spin 1s linear infinite; } @keyframes spin{ to{ transform:rotate(360deg); } }
  /* a11y: видимый фокус */
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible{ outline:2px solid var(--blue); outline-offset:2px; }
  /* профессиональный бейдж категории: точка + иконка + подпись */
  .catb{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; padding:4px 10px 4px 8px; border-radius:980px;
    background:var(--cat-bg); color:color-mix(in srgb, var(--cat) 72%, #1d1d1f); --ic:var(--cat);
    box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--cat) 22%, transparent); }
  .catb .ic{ width:13px; height:13px; }
  .catb .dot{ width:6px; height:6px; border-radius:50%; flex:0 0 auto; background:var(--cat); }
  .guard{ display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:700; color:var(--red); margin-left:8px; letter-spacing:.01em; }
  .guard .ic{ width:12px; height:12px; }
  .card.disc.guarded{ border-color:rgba(255,69,58,.45); }
  .tag{ display:inline-flex; align-items:center; gap:4px; } .tag .ic{ width:11px; height:11px; }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } .card:hover{ transform:none; } }
  /* акцент-кнопка (Public link, Preview) — мягкая заливка, БЕЗ рамки */
  .btn-accent{ background:rgba(10,132,255,.11); color:var(--blue); }
  .btn-accent:hover{ background:rgba(10,132,255,.18); }
  .btn .ic{ opacity:.92; }
  /* :port — технический идентификатор, моноширинный, нейтральный */
  .badge{ font-family:ui-monospace,"SF Mono",Menlo,monospace; background:rgba(20,20,45,.06); color:var(--mut); letter-spacing:-.02em; }
  .prevwrap{ margin-top:11px; border-radius:14px; overflow:hidden; border:1px solid var(--line);
    background:var(--bg2); height:0; opacity:0; transition:height .3s ease, opacity .3s ease; }
  .prevwrap.open{ height:188px; opacity:1; }
  .prevwrap.open.has-hint{ height:226px; }
  .prevhint{ display:flex; align-items:center; gap:5px; padding:7px 10px; font-size:11px; color:var(--mut); line-height:1.35; background:rgba(255,255,255,.5); }
  .prevhint .ic{ width:12px; height:12px; opacity:.55; flex:0 0 auto; }
  .prevhint a{ color:var(--blue); text-decoration:none; white-space:nowrap; }
  .thumb{ position:relative; width:100%; height:188px; cursor:zoom-in; }
  .thumb iframe{ position:absolute; top:0; left:0; width:1320px; height:825px; transform:scale(.235);
    transform-origin:top left; border:0; pointer-events:none; background:#fff; }
  .thumb .expand{ position:absolute; right:8px; bottom:8px; background:rgba(0,0,0,.6); color:#fff;
    font-size:11px; padding:3px 8px; border-radius:7px; }
  .thumb .blocked{ position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    text-align:center; color:var(--mut); font-size:12px; padding:0 20px; background:var(--bg2); }

  .modal{ position:fixed; inset:0; background:rgba(0,0,0,.55); backdrop-filter:blur(6px); display:none;
    align-items:center; justify-content:center; z-index:50; padding:24px; }
  .modal.show{ display:flex; }
  .mbox{ background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.4); display:flex; flex-direction:column; }
  .mbox.viewer{ width:min(1200px,95vw); height:min(800px,90vh); }
  .mbox.form{ width:min(460px,95vw); padding:0; }
  .mbar{ display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--line); }
  .mbar .t{ font-weight:650; font-size:15px; } .mbar a{ color:var(--blue); font-size:12px; text-decoration:none; }
  .mbox.viewer iframe{ flex:1; border:0; width:100%; }
  .fbody{ padding:18px; display:flex; flex-direction:column; gap:11px; }
  .fbody label{ font-size:12px; color:var(--mut); display:block; margin-bottom:4px; }
  .fbody input, .fbody select{ width:100%; border:1px solid var(--line); border-radius:11px; padding:10px 12px;
    font-size:14px; font-family:inherit; outline:none; }
  .fbody input:focus{ border-color:var(--blue); box-shadow:0 0 0 4px rgba(0,113,227,.1); }
  .frow{ display:flex; gap:10px; } .frow>div{ flex:1; }
  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(10px);
    background:rgba(30,30,32,.95); color:#fff; padding:11px 18px; border-radius:12px; font-size:13px;
    opacity:0; transition:.25s; pointer-events:none; box-shadow:0 8px 30px rgba(0,0,0,.3); z-index:60; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <header>
    <div class="ring">
      <svg width="80" height="80"><circle cx="40" cy="40" r="34" fill="none" stroke="#e6e6ea" stroke-width="8"/>
        <circle id="arc" cx="40" cy="40" r="34" fill="none" stroke="var(--green)" stroke-width="8"
          stroke-linecap="round" stroke-dasharray="214" stroke-dashoffset="214"/></svg>
      <div class="num rounded"><b id="upn">0</b><span><span data-i="of">of</span> <span id="totn">0</span></span></div>
    </div>
    <div>
      <h1 class="rounded" data-i="title">Localhost Control</h1>
      <div class="sub"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="opacity:.5;vertical-align:-2px"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg> 3s · <span id="ts"></span></div>
      <div class="legend">
        <div><span class="ld" style="background:var(--green)"></span> <span id="upc">0</span> <span data-i="working">работает</span></div>
        <div><span class="ld" style="background:var(--red)"></span> <span id="downc">0</span> <span data-i="stopped">выключено</span></div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="ctl">
      <button class="btn-add" onclick="openForm()" data-i="addService">+ Сервис</button>
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input class="field" id="q" oninput="render()"/>
      </div>
      <select class="field" id="lang" onchange="setLang(this.value)"></select>
      <button class="pausebtn" id="pause" aria-label="пауза" onclick="togglePause()"></button>
    </div>
  </header>

  <div id="platwarn" style="display:none;max-width:1180px;margin:0 auto 16px;background:rgba(255,159,10,.12);border:1px solid rgba(255,159,10,.3);border-radius:14px;padding:12px 16px;font-size:13px;color:#9a6a00"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px"><path d="M10.3 3.6 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.6a2 2 0 0 0-3.4 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg> <span data-i="macOnly">AI Garage рассчитан на macOS.</span></div>

  <div id="selftun" style="display:none;max-width:1180px;margin:0 auto 16px;background:rgba(255,159,10,.13);border:1px solid rgba(255,159,10,.32);border-radius:14px;padding:10px 14px;font-size:13px;color:#9a6a00"></div>

  <div class="grid" id="grid"></div>

  <div id="disc-wrap" style="max-width:1180px;margin:26px auto 0;display:none">
    <div style="font-size:14px;color:var(--mut);margin:0 0 12px 2px"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="opacity:.6;vertical-align:-2px"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg> <span data-i="discovered">Обнаружено</span> · <span id="disc-n"></span> <span style="color:var(--faint)" data-i="discHint">(запущено, но не сохранено)</span> <button class="btn btn-soft" style="font-size:12px;padding:5px 11px;margin-left:6px" onclick="saveAllDiscovered()"><span data-i="saveAll">Добавить всё</span></button></div>
    <div class="grid" id="disc-grid"></div>
  </div>

  <!-- модалка-просмотр -->
  <div class="modal" id="viewer" onclick="if(event.target===this)closeViewer()">
    <div class="mbox viewer">
      <div class="mbar"><span class="t" id="v-title"></span>
        <a id="v-link" target="_blank" data-i="openTab">открыть в новой вкладке ↗</a>
        <div class="spacer"></div><button class="btn btn-soft" onclick="closeViewer()" data-i="close">Закрыть</button></div>
      <iframe id="v-frame" sandbox="allow-same-origin allow-scripts allow-forms" src="about:blank"></iframe>
    </div>
  </div>

  <!-- модалка-форма добавления -->
  <div class="modal" id="formModal" onclick="if(event.target===this)closeForm()">
    <div class="mbox form">
      <div class="mbar"><span class="t" data-i="addService">+ Сервис</span></div>
      <div class="fbody">
        <div><label data-i="fName">Название</label><input id="f-name" placeholder="My App"/></div>
        <div class="frow">
          <div><label data-i="fType">Тип</label><select id="f-type" onchange="toggleCmd()">
            <option value="local" data-i="fTypeLocal">локальный (с кнопками)</option>
            <option value="link" data-i="fTypeLink">ссылка (только статус)</option></select></div>
          <div><label data-i="fPort">Порт</label><input id="f-port" type="number" placeholder="3000"/></div>
        </div>
        <div><label>URL</label><input id="f-url" placeholder="http://localhost:3000"/></div>
        <div><label data-i="fHost">Устройство (Mac / VPS / своё)</label>
          <input id="f-host" list="hostlist" placeholder="Mac"/>
          <datalist id="hostlist"><option value="Mac"></option><option value="VPS"></option></datalist></div>
        <div id="cmd-fields">
          <div><label data-i="fStart">Команда старта</label><input id="f-start" placeholder="npm run dev"/></div>
          <div class="frow">
            <div><label data-i="fStop">Команда стопа</label><input id="f-stop" placeholder="lsof -ti:3000 | xargs kill"/></div>
            <div><label data-i="fCwd">Папка</label><input id="f-cwd" placeholder="~/projects/app"/></div>

function token(){ return localStorage.getItem('lc-token')||''; }
async function api(path,body){

async function killPort(port){
  const danger = port<1024 ? 'системный порт' : (SYS_PORTS[port]||'');
  const msg = danger
    ? `⚠️ Порт ${port} — ${danger}. Убить процесс? Возможна ПОТЕРЯ ДАННЫХ.`
    : `Освободить порт ${port}? Процесс будет остановлен.`;
  if(!confirm(msg)) { closeMenus(); return; }
  const j=await api('/api/kill-port',{port}); toast(j.ok?'✅ '+(j.note||''):'⛔️ '+(j.error||'')); closeMenus(); setTimeout(load,800); }

/* перетаскивание карточек (pointer-события: надёжно + автоскролл к краям экрана) */
let _asTimer=0,_asD=0;
function autoScroll(y){ const m=90; _asD = y<m? -16 : (y>innerHeight-m? 16 : 0);
  if(_asD && !_asTimer) _asTimer=setInterval(()=>scrollBy(0,_asD),16); if(!_asD && _asTimer){ clearInterval(_asTimer); _asTimer=0; } }
function stopAutoScroll(){ if(_asTimer){ clearInterval(_asTimer); _asTimer=0; } _asD=0; }
async function persistOrder(){ const names=[...document.querySelectorAll('#grid .card')].map(c=>c.dataset.name);
  await api('/api/service-reorder',{order:names}); lastSig=''; load(); }
function dragPointerDown(e){
  if(e.button!==0) return;
  if(e.target.closest('button,a,input,select,.menu,.icbtn,.kebab,.thumb,.prevwrap')) return;  // не мешаем кликам/превью
  const card=e.currentTarget, sx=e.clientX, sy=e.clientY; let started=false;
  const move=(ev)=>{
    if(!started){ if(Math.abs(ev.clientX-sx)+Math.abs(ev.clientY-sy)<6) return; started=true; _dragging=true; card.classList.add('dragging'); document.body.style.userSelect='none'; }
    ev.preventDefault();
    card.style.pointerEvents='none'; const under=document.elementFromPoint(ev.clientX,ev.clientY); card.style.pointerEvents='';
    const tgt=under&&under.closest&&under.closest('#grid .card');
    if(tgt&&tgt!==card){ const r=tgt.getBoundingClientRect(); const after=(ev.clientY-r.top)/r.height>0.5; tgt.parentNode.insertBefore(card, after?tgt.nextSibling:tgt); }
    autoScroll(ev.clientY);
  };
  const up=()=>{ removeEventListener('pointermove',move); removeEventListener('pointerup',up); stopAutoScroll(); document.body.style.userSelect='';
    if(started){ card.classList.remove('dragging'); _dragging=false; persistOrder(); } };
  addEventListener('pointermove',move); addEventListener('pointerup',up);
}

function visible(){ const q=$('q').value.trim().toLowerCase(); return DATA.filter(s=>!q||s.name.toLowerCase().includes(q)); }
function render(){ $('grid').innerHTML=visible().map(card).join('');
  openPrevs.forEach(n=>{ const w=document.querySelector(`[data-prev="${CSS.escape(n)}"]`); if(w){ w.classList.add('open'); buildPreviewContent(w,n); } else openPrevs.delete(n); });
  updateHeader(); }
function patch(){ visible().forEach(s=>{ const c=document.querySelector(`.card[data-name="${CSS.escape(s.name)}"]`); if(!c)return;
    const cls=s.up?'up':'down'; c.classList.toggle('up',s.up); c.classList.toggle('down',!s.up);
    c.querySelector('.pulse').className='pulse '+cls;
    const st=c.querySelector('.state'); st.className='state '+cls; st.style.marginLeft='auto'; st.textContent=s.up?t('working'):t('stopped');
    const tg=c.querySelector('.tgl'); if(tg){ tg.className='btn tgl '+(s.up?'btn-soft':'btn-primary'); tg.style.cssText=s.up?'--ic:var(--ic-stop)':'';
      tg.innerHTML=icon(s.up?'stop':'play')+' '+(s.up?t('stop'):t('start')); tg.onclick=()=>act(s.name,s.up?'stop':'start'); } }); updateHeader(); }
function animNum(el,to){ const from=+el.textContent||0; if(from===to)return; const d=600,t0=performance.now();
  const step=now=>{ const k=Math.min(1,(now-t0)/d); const e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    el.textContent=Math.round(from+(to-from)*e); if(k<1)requestAnimationFrame(step); }; requestAnimationFrame(step); }
function updateHeader(){ const up=DATA.filter(s=>s.up).length,tot=DATA.length;
  animNum($('upn'),up); $('totn').textContent=tot; $('upc').textContent=up; $('downc').textContent=tot-up;
  const C=214; $('arc').style.strokeDashoffset=tot?C-(C*up/tot):C; }

async function load(){ if(paused||document.hidden)return;
  try{ const r=await fetch('/api/status'); const j=await r.json(); DATA=j.services; authOn=j.authOn;
    $('ts').textContent=new Date(j.ts).toLocaleTimeString();
    const sig=DATA.map(s=>s.name+s.hasControls+(s.tunnelManaged?1:0)+(s.tunnel||'')+(s.keepAlive?1:0)).join('|')+'#'+$('q').value;
    if(sig!==lastSig){ lastSig=sig; render(); } else patch();
    renderDiscovered(j.discovered||[]);
    $('platwarn').style.display=(j.platform&&j.platform!=='darwin')?'block':'none';
    const stn=$('selftun'); if(j.selfTunnel){ stn.style.display='block'; stn.innerHTML=`${icon('cloud')} <b>${t('exposed')}</b> · <a href="${safeUrl(j.selfTunnel)}" target="_blank" rel="noopener" style="color:#9a6a00;word-break:break-all">${esc(j.selfTunnel)}</a> <button class="btn btn-soft" style="margin-left:8px;font-size:12px;padding:4px 10px" onclick="tunnelStop(7777)">${t('exposedOff')}</button>`; } else stn.style.display='none';
  }catch(e){ $('ts').textContent='—'; } }

/* живой эффект: спотлайт за курсором на карточках + ambient-glow всей страницы */
let _raf=0,_e=null,_tilt=null,_dragging=false;
addEventListener('pointermove',e=>{ _e=e; if(_raf)return; _raf=requestAnimationFrame(()=>{ _raf=0; if(_dragging)return; const ev=_e;
  document.documentElement.style.setProperty('--gx',(ev.clientX/innerWidth*100).toFixed(1)+'%');
  document.documentElement.style.setProperty('--gy',(ev.clientY/innerHeight*100).toFixed(1)+'%');
  const c=ev.target.closest&&ev.target.closest('.card');
  if(c!==_tilt){ if(_tilt){ _tilt.style.setProperty('--rx','0deg'); _tilt.style.setProperty('--ry','0deg'); } _tilt=c; }
  if(c){ const r=c.getBoundingClientRect(); const mx=(ev.clientX-r.left)/r.width, my=(ev.clientY-r.top)/r.height;
    c.style.setProperty('--mx',(mx*100).toFixed(1)+'%'); c.style.setProperty('--my',(my*100).toFixed(1)+'%');
    c.style.setProperty('--ry',((mx-.5)*6.5).toFixed(2)+'deg'); c.style.setProperty('--rx',((.5-my)*6.5).toFixed(2)+'deg'); } }); },{passive:true});
