<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Localhost Control</title>
<style>
  :root{
    --bg:#f5f5f7; --bg2:#ececed; --card:#ffffff; --txt:#1d1d1f; --mut:#6e6e73; --faint:#86868b;
    --line:#e3e3e6; --blue:#0071e3; --blue-d:#0060c0; --green:#34c759; --red:#ff3b30;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    --shadow-h:0 6px 14px rgba(0,0,0,.08), 0 20px 48px rgba(0,0,0,.12);
    --r:22px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, #eaf2ff 0%, rgba(234,242,255,0) 55%),
      radial-gradient(1000px 500px at -5% 10%, #f3ecff 0%, rgba(243,236,255,0) 50%), var(--bg);
    color:var(--txt); padding:30px 26px 70px;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .rounded{ font-family:ui-rounded,-apple-system,"SF Pro Rounded",sans-serif; }
  header{ max-width:1180px; margin:0 auto 22px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  h1{ font-size:25px; letter-spacing:-.02em; margin:0; font-weight:700; }
  .sub{ color:var(--faint); font-size:13px; margin-top:3px; }
  .ring{ position:relative; width:80px; height:80px; flex:0 0 auto; }
  .ring svg{ transform:rotate(-90deg); }
  .ring .num{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring .num b{ font-size:21px; line-height:1; letter-spacing:-.03em; }
  .ring .num span{ font-size:10px; color:var(--mut); margin-top:2px; }
  .legend{ display:flex; gap:14px; margin-top:7px; }
  .legend div{ font-size:13px; color:var(--mut); display:flex; align-items:center; gap:6px; }
  .ld{ width:9px; height:9px; border-radius:50%; }
  .spacer{ flex:1; }
  .ctl{ display:flex; align-items:center; gap:8px; }
  .field{ border:1px solid var(--line); background:rgba(255,255,255,.75); backdrop-filter:blur(8px);
    border-radius:980px; padding:9px 14px; font-size:14px; color:var(--txt); outline:none; transition:.2s; font-family:inherit; }
  .field:focus{ border-color:var(--blue); box-shadow:0 0 0 4px rgba(0,113,227,.12); }
  .search{ position:relative; }
  .search input{ padding-left:36px; width:210px; }
  .search input:focus{ width:240px; }
  .search svg{ position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.4; }
  select.field{ cursor:pointer; padding-right:30px; }
  .btn-add{ background:var(--blue); color:#fff; border:none; border-radius:980px; padding:10px 16px;
    font-size:14px; font-weight:550; cursor:pointer; box-shadow:0 1px 6px rgba(0,113,227,.3); font-family:inherit; transition:.15s; }
  .btn-add:hover{ background:var(--blue-d); }
  .pausebtn{ border:1px solid var(--line); background:rgba(255,255,255,.7); border-radius:980px;
    padding:9px 14px; font-size:13px; cursor:pointer; color:var(--mut); font-family:inherit; }
  .pausebtn:hover{ border-color:var(--blue); color:var(--blue); }

  .grid{ max-width:1180px; margin:0 auto; display:grid; gap:18px; align-items:start;   /* авто-высота */
         grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); }
  .card{ position:relative; background:var(--card); border:1px solid rgba(0,0,0,.05); border-radius:var(--r);
    padding:17px 18px 15px; box-shadow:var(--shadow); overflow:hidden;
    transition:transform .28s cubic-bezier(.2,.7,.2,1), box-shadow .28s ease; }
  .card:hover{ transform:translateY(-5px) scale(1.012); box-shadow:var(--shadow-h); }
  .card::before{ content:""; position:absolute; left:0; top:0; right:0; height:4px; background:var(--faint); opacity:.5; }
  .card.up::before{ background:linear-gradient(90deg,var(--green),#7be39a); }
  .card.down::before{ background:linear-gradient(90deg,var(--red),#ff8a80); }
  .top{ display:flex; align-items:center; gap:10px; }
  .pulse{ width:12px; height:12px; border-radius:50%; flex:0 0 auto; background:#c7c7cc; position:relative; }
  .pulse.up{ background:var(--green); }
  .pulse.down{ background:var(--red); }
  .pulse.up::after{ content:""; position:absolute; inset:-5px; border-radius:50%; border:2px solid var(--green);
    opacity:.5; animation:ring 2s ease-out infinite; }
  @keyframes ring{ 0%{ transform:scale(.6); opacity:.6 } 100%{ transform:scale(1.5); opacity:0 } }
  .name{ font-weight:650; font-size:15.5px; letter-spacing:-.01em; }
  .state{ font-size:11.5px; font-weight:600; padding:3px 9px; border-radius:980px; }
  .state.up{ color:#1a7f37; background:rgba(52,199,89,.14); }
  .state.down{ color:#b3261e; background:rgba(255,59,48,.12); }
  .hostb{ font-size:11px; font-weight:600; padding:3px 8px; border-radius:980px; background:var(--bg2); color:var(--mut); flex:0 0 auto; }
  .card.disc{ border-style:dashed; box-shadow:none; padding:14px 16px; }
  .card.disc:hover{ transform:translateY(-3px); box-shadow:var(--shadow); }
  .card.disc .cmd{ font-weight:600; font-size:14px; } .card.disc .pid{ color:var(--faint); font-size:11px; }
  .thumb .reload{ position:absolute; left:8px; bottom:8px; background:rgba(0,0,0,.6); color:#fff; border:none;
    font-size:13px; width:26px; height:26px; border-radius:7px; cursor:pointer; }
  .kebab{ border:none; background:transparent; color:var(--faint); cursor:pointer; font-size:17px; padding:2px 4px;
    border-radius:7px; line-height:1; }
  .kebab:hover{ background:var(--bg2); color:var(--txt); }
  .menu{ position:absolute; right:14px; top:42px; background:#fff; border:1px solid var(--line); border-radius:12px;
    box-shadow:var(--shadow-h); padding:5px; z-index:5; display:none; min-width:170px; }
  .menu.open{ display:block; }
  .menu button{ display:block; width:100%; text-align:left; border:none; background:none; padding:8px 10px;
    border-radius:8px; font-size:13px; cursor:pointer; color:var(--txt); font-family:inherit; }
  .menu button:hover{ background:var(--bg2); }
  .menu button.del{ color:var(--red); }
  .note{ color:var(--mut); font-size:12.5px; margin:9px 0 10px; line-height:1.4; }
  .urls{ display:flex; flex-direction:column; gap:6px; margin-bottom:11px; }
  .urlrow{ display:flex; align-items:center; gap:6px; }
  .urlrow a{ color:var(--blue); text-decoration:none; font-size:13px; word-break:break-all; flex:1; }
  .urlrow a:hover{ text-decoration:underline; }
  .badge{ font-size:11px; font-weight:600; color:var(--mut); background:var(--bg2); padding:3px 8px; border-radius:980px; flex:0 0 auto; }
  .tag{ font-size:10px; padding:2px 7px; border-radius:6px; background:var(--bg2); color:var(--faint); flex:0 0 auto; }
  .icbtn{ border:none; background:var(--bg2); border-radius:8px; width:28px; height:26px; cursor:pointer;
    font-size:12px; color:var(--mut); flex:0 0 auto; transition:.15s; }
  .icbtn:hover{ background:var(--blue); color:#fff; }
  .row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .btn{ border:none; border-radius:980px; padding:8px 15px; font-size:13px; font-weight:550; cursor:pointer;
    transition:transform .12s ease, background .2s; font-family:inherit; }
  .btn:active{ transform:scale(.95); }
  .btn-primary{ background:var(--blue); color:#fff; box-shadow:0 1px 6px rgba(0,113,227,.3); }
  .btn-primary:hover{ background:var(--blue-d); }
  .btn-soft{ background:var(--bg2); color:var(--txt); } .btn-soft:hover{ background:#e2e2e5; }
  .btn-danger{ background:rgba(255,59,48,.1); color:var(--red); } .btn-danger:hover{ background:rgba(255,59,48,.18); }
  .btn-ghost{ background:transparent; color:var(--mut); padding:8px 12px; } .btn-ghost:hover{ color:var(--blue); background:var(--bg2); }
  .prevwrap{ margin-top:11px; border-radius:14px; overflow:hidden; border:1px solid var(--line);
    background:var(--bg2); height:0; opacity:0; transition:height .3s ease, opacity .3s ease; }
  .prevwrap.open{ height:188px; opacity:1; }
  .thumb{ position:relative; width:100%; height:188px; cursor:zoom-in; }
  .thumb iframe{ position:absolute; top:0; left:0; width:1320px; height:825px; transform:scale(.235);
    transform-origin:top left; border:0; pointer-events:none; background:#fff; }
  .thumb .expand{ position:absolute; right:8px; bottom:8px; background:rgba(0,0,0,.6); color:#fff;
    font-size:11px; padding:3px 8px; border-radius:7px; }
  .thumb .blocked{ position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    text-align:center; color:var(--mut); font-size:12px; padding:0 20px; background:var(--bg2); }

  .modal{ position:fixed; inset:0; background:rgba(0,0,0,.55); backdrop-filter:blur(6px); display:none;
    align-items:center; justify-content:center; z-index:50; padding:24px; }
  .modal.show{ display:flex; }
  .mbox{ background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.4); display:flex; flex-direction:column; }
  .mbox.viewer{ width:min(1200px,95vw); height:min(800px,90vh); }
  .mbox.form{ width:min(460px,95vw); padding:0; }
  .mbar{ display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--line); }
  .mbar .t{ font-weight:650; font-size:15px; } .mbar a{ color:var(--blue); font-size:12px; text-decoration:none; }
  .mbox.viewer iframe{ flex:1; border:0; width:100%; }
  .fbody{ padding:18px; display:flex; flex-direction:column; gap:11px; }
  .fbody label{ font-size:12px; color:var(--mut); display:block; margin-bottom:4px; }
  .fbody input, .fbody select{ width:100%; border:1px solid var(--line); border-radius:11px; padding:10px 12px;
    font-size:14px; font-family:inherit; outline:none; }
  .fbody input:focus{ border-color:var(--blue); box-shadow:0 0 0 4px rgba(0,113,227,.1); }
  .frow{ display:flex; gap:10px; } .frow>div{ flex:1; }
  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(10px);
    background:rgba(30,30,32,.95); color:#fff; padding:11px 18px; border-radius:12px; font-size:13px;
    opacity:0; transition:.25s; pointer-events:none; box-shadow:0 8px 30px rgba(0,0,0,.3); z-index:60; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>

<body>
  <header>
    <div class="ring">
      <svg width="80" height="80"><circle cx="40" cy="40" r="34" fill="none" stroke="#e6e6ea" stroke-width="8"/>
        <circle id="arc" cx="40" cy="40" r="34" fill="none" stroke="var(--green)" stroke-width="8"
          stroke-linecap="round" stroke-dasharray="214" stroke-dashoffset="214"/></svg>
      <div class="num rounded"><b id="upn">0</b><span><span data-i="of">of</span> <span id="totn">0</span></span></div>
    </div>
    <div>
      <h1 class="rounded" data-i="title">Localhost Control</h1>
      <div class="sub">🔄 3s · <span id="ts"></span></div>
      <div class="legend">
        <div><span class="ld" style="background:var(--green)"></span> <span id="upc">0</span> <span data-i="working">работает</span></div>
        <div><span class="ld" style="background:var(--red)"></span> <span id="downc">0</span> <span data-i="stopped">выключено</span></div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="ctl">
      <button class="btn-add" onclick="openForm()" data-i="addService">+ Сервис</button>
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input class="field" id="q" oninput="render()"/>
      </div>
      <select class="field" id="lang" onchange="setLang(this.value)"></select>
      <button class="pausebtn" id="pause" onclick="togglePause()">⏸</button>
    </div>
  </header>

  <div class="grid" id="grid"></div>

  <div id="disc-wrap" style="max-width:1180px;margin:26px auto 0;display:none">
    <div style="font-size:14px;color:var(--mut);margin:0 0 12px 2px">🔍 <span data-i="discovered">Обнаружено</span> · <span id="disc-n"></span> <span style="color:var(--faint)" data-i="discHint">(запущено, но не сохранено)</span></div>
    <div class="grid" id="disc-grid"></div>
  </div>

  <!-- модалка-просмотр -->
  <div class="modal" id="viewer" onclick="if(event.target===this)closeViewer()">
    <div class="mbox viewer">
      <div class="mbar"><span class="t" id="v-title"></span>
        <a id="v-link" target="_blank" data-i="openTab">открыть в новой вкладке ↗</a>
        <div class="spacer"></div><button class="btn btn-soft" onclick="closeViewer()" data-i="close">Закрыть</button></div>
      <iframe id="v-frame" src="about:blank"></iframe>
    </div>
  </div>

  <!-- модалка-форма добавления -->
  <div class="modal" id="formModal" onclick="if(event.target===this)closeForm()">
    <div class="mbox form">
      <div class="mbar"><span class="t" data-i="addService">+ Сервис</span></div>
      <div class="fbody">
        <div><label data-i="fName">Название</label><input id="f-name" placeholder="My App"/></div>
        <div class="frow">
          <div><label data-i="fType">Тип</label><select id="f-type" onchange="toggleCmd()">
            <option value="local" data-i="fTypeLocal">локальный (с кнопками)</option>
            <option value="link" data-i="fTypeLink">ссылка (только статус)</option></select></div>
          <div><label data-i="fPort">Порт</label><input id="f-port" type="number" placeholder="3000"/></div>
        </div>
        <div><label>URL</label><input id="f-url" placeholder="http://localhost:3000"/></div>
        <div><label data-i="fHost">Устройство (Mac / VPS / своё)</label>
          <input id="f-host" list="hostlist" placeholder="Mac"/>
          <datalist id="hostlist"><option value="Mac"></option><option value="VPS"></option></datalist></div>
        <div id="cmd-fields">
          <div><label data-i="fStart">Команда старта</label><input id="f-start" placeholder="npm run dev"/></div>
          <div class="frow">
            <div><label data-i="fStop">Команда стопа</label><input id="f-stop" placeholder="lsof -ti:3000 | xargs kill"/></div>
            <div><label data-i="fCwd">Папка</label><input id="f-cwd" placeholder="~/projects/app"/></div>
          </div>
        </div>
        <div><label data-i="fNote">Заметка</label><input id="f-note" placeholder=""/></div>
        <div class="row" style="justify-content:flex-end; margin-top:4px">
          <button class="btn btn-soft" onclick="closeForm()" data-i="cancel">Отмена</button>
          <button class="btn btn-primary" onclick="saveService()" data-i="save">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

let lang=localStorage.getItem('lc-lang')||(navigator.language||'en').slice(0,2);
if(!DICT[lang]) lang='en';
const t=k=>(DICT[lang]&&DICT[lang][k])||DICT.en[k]||k;

let DATA=[]; let paused=false; let authOn=false; let lastSig='';
const $=id=>document.getElementById(id);
const esc=x=>String(x).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const toast=m=>{const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._);e._=setTimeout(()=>e.classList.remove('show'),2200);};
const copy=v=>navigator.clipboard.writeText(v).then(()=>toast(t('copied')+': '+v));

function token(){ return localStorage.getItem('lc-token')||''; }
async function api(path,body){
  const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json','x-control-token':token()},body:JSON.stringify(body||{})});
  if(r.status===401){ const tk=prompt(t('tokenPrompt')); if(tk){ localStorage.setItem('lc-token',tk); return api(path,body);} toast(t('needToken')); return {ok:false}; }
  return r.json();
}

/* язык */
function fillLangs(){ $('lang').innerHTML=Object.entries(LANGS).map(([k,v])=>`<option value="${k}" ${k===lang?'selected':''}>${v}</option>`).join(''); }
function applyI18n(){
  document.querySelectorAll('[data-i]').forEach(el=>el.textContent=t(el.dataset.i));
  $('q').placeholder=t('searchPh'); document.documentElement.lang=lang;
  document.documentElement.dir = lang==='ar'?'rtl':'ltr';
}
function setLang(l){ lang=l; localStorage.setItem('lc-lang',l); applyI18n(); render(); }

async function act(name,what){ toast('…');
  const j=await api('/api/'+what,{name}); toast(j.ok?'✅ '+(j.note||'ok'):'⛔️ '+(j.error||'err')); setTimeout(load,700); }
async function toggleKeepAlive(name,enable){ toast(enable?'Включаю автозапуск…':'Выключаю…');
  const j=await api('/api/keepalive',{name,enable}); toast(j.ok?'✅ '+(j.note||''):'⛔️ '+(j.error||'')); lastSig=''; setTimeout(load,700); }
async function killPort(port){ const j=await api('/api/kill-port',{port}); toast(j.ok?'✅ '+(j.note||''):'⛔️ '+(j.error||'')); closeMenus(); setTimeout(load,700); }
async function delService(name){ if(!confirm(t('confirmDel')))return; const j=await api('/api/service-remove',{name}); toast(j.ok?'✅':'⛔️'); lastSig=''; load(); }

/* меню на карточке */
function toggleMenu(e,name){ e.stopPropagation(); closeMenus(); const m=document.querySelector(`[data-menu="${CSS.escape(name)}"]`); if(m)m.classList.add('open'); }
function closeMenus(){ document.querySelectorAll('.menu.open').forEach(m=>m.classList.remove('open')); }
document.addEventListener('click',closeMenus);

/* превью */
function togglePreview(name){ const w=document.querySelector(`[data-prev="${CSS.escape(name)}"]`); if(!w)return;
  const open=w.classList.toggle('open');
  if(open&&!w.dataset.loaded){ const s=DATA.find(x=>x.name===name);
    w.innerHTML=`<div class="thumb" onclick="openViewer('${esc(name)}')">
      <iframe src="${s.url}"></iframe>
      <div class="blocked">${t('blocked')}</div>
      <button class="reload" title="перезагрузить" onclick="event.stopPropagation();reloadPreview('${esc(name)}')">↻</button>
      <div class="expand">${t('expand')}</div></div>`;
    w.dataset.loaded='1'; } }
function reloadPreview(name){ const w=document.querySelector(`[data-prev="${CSS.escape(name)}"]`); if(!w)return;
  const f=w.querySelector('iframe'); if(f){ const s=DATA.find(x=>x.name===name); f.src=s.url+(s.url.includes('?')?'&':'?')+'_r='+Date.now(); toast('↻'); } }
function openViewer(name){ const s=DATA.find(x=>x.name===name); if(!s)return;
  $('v-title').textContent=s.name; $('v-link').href=s.url; $('v-frame').src=s.url; $('viewer').classList.add('show'); }
function closeViewer(){ $('viewer').classList.remove('show'); $('v-frame').src='about:blank'; }
function togglePause(){ paused=!paused; $('pause').textContent=paused?'▶':'⏸'; if(!paused)load(); }

/* форма добавления */
function openForm(){ $('formModal').classList.add('show'); }
function closeForm(){ $('formModal').classList.remove('show'); }
function toggleCmd(){ $('cmd-fields').style.display=$('f-type').value==='local'?'block':'none'; }
async function saveService(){
  const s={ name:$('f-name').value.trim(), type:$('f-type').value, port:+$('f-port').value||undefined,
    url:$('f-url').value.trim(), host:$('f-host').value.trim()||'Mac', note:$('f-note').value.trim() };
  if(s.type==='local'){ s.startCmd=$('f-start').value.trim()||undefined; s.stopCmd=$('f-stop').value.trim()||undefined;
    s.cwd=$('f-cwd').value.trim()||undefined; }
  if(!s.name){ toast('⛔️ '+t('fName')); return; }
  const j=await api('/api/service-add',{service:s});
  if(j.ok){ toast('✅ '+(j.note||'')); closeForm(); ['f-name','f-port','f-url','f-host','f-start','f-stop','f-cwd','f-note'].forEach(i=>$(i).value=''); lastSig=''; load(); }
  else toast('⛔️ '+(j.error||'')); }

function card(s){ const cls=s.up?'up':'down';
  const ctrls=s.hasControls?`<div class="row" style="margin-top:4px">
      <button class="btn btn-primary" onclick="act('${esc(s.name)}','start')">▶ ${t('start')}</button>
      <button class="btn btn-danger" onclick="act('${esc(s.name)}','stop')">■ ${t('stop')}</button>
      <button class="btn btn-soft" onclick="act('${esc(s.name)}','restart')">⟳ ${t('restart')}</button>
      <button class="btn ${s.keepAlive?'btn-primary':'btn-ghost'}" onclick="toggleKeepAlive('${esc(s.name)}',${!s.keepAlive})">🔁 ${s.keepAlive?t('kaOn'):t('keepAlive')}</button>
      <button class="btn btn-ghost" onclick="togglePreview('${esc(s.name)}')">👁 ${t('preview')}</button></div>`
    :`<div class="row" style="margin-top:4px"><span class="note" style="margin:0">${t('managed')}</span>
      <button class="btn btn-ghost" style="margin-left:auto" onclick="togglePreview('${esc(s.name)}')">👁 ${t('preview')}</button></div>`;
  const tunnel=s.tunnel?`<div class="urlrow"><span class="tag">📱 ${t('phone')}</span>
      <a href="${s.tunnel}" target="_blank">${esc(s.tunnel)}</a><button class="icbtn" onclick="copy('${s.tunnel}')">⧉</button></div>`:'';
  return `<div class="card ${cls}" data-name="${esc(s.name)}">
    <div class="top"><span class="pulse ${cls}"></span><span class="name">${esc(s.name)}</span>
      <span class="hostb">${/vps|впс|server|серв|cloud/i.test(s.host||'')?'☁️':'💻'} ${esc(s.host||'Mac')}</span>
      <span class="state ${cls}" style="margin-left:auto">${s.up?t('working'):t('stopped')}</span>
      <button class="kebab" onclick="toggleMenu(event,'${esc(s.name)}')">⋯</button></div>
    <div class="menu" data-menu="${esc(s.name)}">
      ${s.port?`<button onclick="killPort(${s.port})">🧹 ${t('freePort')} :${s.port}</button>`:''}
      <button class="del" onclick="delService('${esc(s.name)}')">🗑 ${t('remove')}</button></div>
    ${s.note?`<div class="note">${esc(s.note)}</div>`:'<div style="height:5px"></div>'}
    <div class="urls"><div class="urlrow"><span class="badge">:${s.port||'—'}</span>
        <a href="${s.url}" target="_blank">${esc(s.url)}</a><button class="icbtn" onclick="copy('${s.url}')">⧉</button></div>
      ${tunnel}</div>
    ${ctrls}<div class="prevwrap" data-prev="${esc(s.name)}"></div></div>`; }

function dcard(d){ return `<div class="card disc">
    <div class="top"><span class="pulse up"></span><span class="cmd">${esc(d.command)}</span>
      <span class="hostb" style="margin-left:auto">:${d.port}</span></div>
    <div class="pid" style="margin:6px 0 10px">PID ${d.pid} · <a href="http://localhost:${d.port}" target="_blank" style="color:var(--blue);text-decoration:none">localhost:${d.port}</a></div>
    <div class="row">
      <button class="btn btn-danger" onclick="killPort(${d.port})">🧹 ${t('freePort')}</button>
      <button class="btn btn-soft" onclick="saveDiscovered(${d.port},'${esc(d.command)}')">＋ ${t('saveBtn')}</button></div></div>`; }
function renderDiscovered(list){ const w=$('disc-wrap');
  if(!list||!list.length){ w.style.display='none'; return; }
  w.style.display='block'; $('disc-n').textContent=list.length; $('disc-grid').innerHTML=list.map(dcard).join(''); }
async function saveDiscovered(port,command){
  const s={name:command+' :'+port, type:'link', port, url:'http://localhost:'+port, host:'Mac', note:'обнаружено'};
  const j=await api('/api/service-add',{service:s}); toast(j.ok?'✅ '+(j.note||''):'⛔️ '+(j.error||'')); lastSig=''; load(); }

function visible(){ const q=$('q').value.trim().toLowerCase(); return DATA.filter(s=>!q||s.name.toLowerCase().includes(q)); }
function render(){ $('grid').innerHTML=visible().map(card).join(''); updateHeader(); }
function patch(){ visible().forEach(s=>{ const c=document.querySelector(`.card[data-name="${CSS.escape(s.name)}"]`); if(!c)return;
    const cls=s.up?'up':'down'; c.classList.toggle('up',s.up); c.classList.toggle('down',!s.up);
    c.querySelector('.pulse').className='pulse '+cls;
    const st=c.querySelector('.state'); st.className='state '+cls; st.style.marginLeft='auto'; st.textContent=s.up?t('working'):t('stopped'); }); updateHeader(); }
function updateHeader(){ const up=DATA.filter(s=>s.up).length,tot=DATA.length;
  $('upn').textContent=up; $('totn').textContent=tot; $('upc').textContent=up; $('downc').textContent=tot-up;
  const C=214; $('arc').style.strokeDashoffset=tot?C-(C*up/tot):C; }

async function load(){ if(paused)return;
  try{ const r=await fetch('/api/status'); const j=await r.json(); DATA=j.services; authOn=j.authOn;
    $('ts').textContent=new Date(j.ts).toLocaleTimeString();
    const sig=DATA.map(s=>s.name+s.hasControls).join('|')+'#'+$('q').value;
    if(sig!==lastSig){ lastSig=sig; render(); } else patch();
    renderDiscovered(j.discovered||[]);
  }catch(e){ $('ts').textContent='—'; } }

fillLangs(); applyI18n(); toggleCmd(); load(); setInterval(load,3000);
</script>
