<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Garage</title>
<link rel="icon" type="image/png" href="/favicon.png"/>
<style>
  :root{
    --bg:#eef0f5; --bg2:#e7e9f0; --card:#ffffff; --txt:#233d4d; --mut:#4d5e6a; --faint:#8a96a0;
    --line:rgba(35,61,77,.12);
    /* тёмный teal #215E61 + неоновый бирюзовый из лого #1CE5E8 рядом; текст #233D4D; CTA оранжевый #FE7F2D; фон светлый */
    --teal:#215e61; --teal-neon:#1ce5e8; --teal-d:#1a4d50; --green:#215e61; --green-d:#1a4d50;
    --blue:#215e61; --blue-d:#1ce5e8; --red:#e5484d;
    --accent:#fe7f2d; --accent-d:#ed6a15;
    --soft:#f3f4f6; --soft-h:#e5e7eb;
    --glass:rgba(255,255,255,.58); --glass-strong:rgba(255,255,255,.72); --glass-brd:rgba(255,255,255,.72);
    --ic-stop:#ff453a;
    --shadow:0 1px 1px rgba(20,20,45,.04), 0 12px 34px -14px rgba(25,25,60,.22);
    --shadow-h:0 2px 4px rgba(20,20,45,.06), 0 30px 60px -18px rgba(25,25,70,.34);
    --r:20px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    min-height:100vh; position:relative;
    background:
      radial-gradient(820px 560px at 9% 3%, rgba(254,127,45,.08), transparent 55%),
      radial-gradient(820px 560px at 93% 1%, rgba(28,229,232,.12), transparent 55%),
      radial-gradient(900px 720px at 78% 110%, rgba(33,94,97,.07), transparent 55%),
      linear-gradient(180deg,#f5f6fa,#e8eaf1);
    background-attachment:fixed;
    color:var(--txt); padding:30px 26px 80px;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  /* живой ambient-glow за курсором (как pletor) */
  body::before{ content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(440px circle at var(--gx,50%) var(--gy,-10%), rgba(254,127,45,.07), transparent 62%); }
  header, .grid, #disc-wrap, #platwarn, #selftun{ position:relative; z-index:1; }
  .rounded{ font-family:ui-rounded,-apple-system,"SF Pro Rounded",sans-serif; }
  header{ max-width:1180px; margin:0 auto 24px; display:flex; align-items:center; gap:20px; flex-wrap:wrap;
    background:var(--glass-strong); backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-brd); border-radius:24px; padding:18px 22px; box-shadow:var(--shadow); }
  h1{ font-size:28px; letter-spacing:-.022em; margin:0; font-weight:700; line-height:1.1; }
  .sub{ color:var(--faint); font-size:13px; margin-top:3px; }
  .logo{ height:67px; width:auto; flex:0 0 auto; filter:drop-shadow(0 4px 9px rgba(20,20,45,.18)); }
  .brandblock{ margin-left:-8px; }   /* название вплотную к логотипу */
  h1.brand{ color:var(--txt); letter-spacing:-.022em; }
  .ring{ position:relative; width:80px; height:80px; flex:0 0 auto; }
  .ring svg{ transform:rotate(-90deg); }
  #arc{ transition:stroke-dashoffset .7s cubic-bezier(.2,.7,.2,1); }
  .ring .num{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring .num b{ font-size:21px; line-height:1; letter-spacing:-.03em; }
  .ring .num span{ font-size:10px; color:var(--mut); margin-top:2px; }
  .legend{ display:flex; gap:14px; margin-top:7px; }
  .legend div{ font-size:13px; color:var(--mut); display:flex; align-items:center; gap:6px; }
  .ld{ width:9px; height:9px; border-radius:50%; }
  .spacer{ flex:1; }
  .ctl{ display:flex; align-items:center; gap:8px; }
  .field{ border:1px solid var(--line); background:rgba(255,255,255,.75); backdrop-filter:blur(8px);
    border-radius:980px; padding:9px 14px; font-size:14px; color:var(--txt); outline:none; transition:.2s; font-family:inherit; }
  .field:focus{ border-color:var(--accent); box-shadow:0 0 0 4px rgba(254,127,45,.14); }
  .search{ position:relative; }
  .search input{ padding-left:36px; width:210px; }
  .search input:focus{ width:240px; }
  .search svg{ position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.4; }
  select.field{ cursor:pointer; padding-right:30px; }
  .btn-add{ background:var(--accent); color:#fff; border:none; border-radius:980px; padding:10px 16px;
    font-size:14px; font-weight:600; cursor:pointer; box-shadow:0 2px 10px rgba(254,127,45,.32); font-family:inherit; transition:.15s; }
  .btn-add:hover{ background:var(--accent-d); transform:translateY(-1px); }
  .pausebtn{ border:1px solid var(--line); background:rgba(255,255,255,.6); border-radius:980px;
    padding:9px 14px; font-size:13px; cursor:pointer; color:var(--mut); font-family:inherit; }
  .pausebtn:hover{ border-color:var(--accent); color:var(--accent); }

  .grid{ max-width:1180px; margin:0 auto; display:grid; gap:20px; align-items:start;   /* авто-высота */
         grid-template-columns:repeat(auto-fill,minmax(335px,1fr)); perspective:1400px; }
  .card{ position:relative; z-index:1; background:var(--glass); backdrop-filter:blur(22px) saturate(185%);
    -webkit-backdrop-filter:blur(22px) saturate(185%); border:1px solid var(--glass-brd); border-radius:var(--r);
    padding:17px 17px 15px; box-shadow:var(--shadow); overflow:hidden; transform-style:preserve-3d;
    transform:translateY(var(--lift,0)) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));
    transition:transform .18s cubic-bezier(.2,.7,.2,1), box-shadow .3s ease; }
  .card:hover{ --lift:-6px; box-shadow:var(--shadow-h); }
  /* перетаскивание: тянем за тело карточки (курсор-рука), кнопки/ссылки остаются кликабельными */
  .card[data-name]{ cursor:grab; touch-action:pan-y; }   /* тач: вертикальный скролл свободен, драг — по long-press */
  .card.dragging{ cursor:grabbing; box-shadow:0 28px 60px -12px rgba(25,25,70,.42); transition:none; }
  .card-placeholder{ border:2px dashed var(--teal-d); border-radius:var(--r); background:rgba(33,94,97,.06); box-sizing:border-box; }
  body.dragging-active, body.dragging-active *{ cursor:grabbing !important; user-select:none; }
  .section{ grid-column:1/-1; display:flex; align-items:center; gap:8px; font-size:13px; font-weight:650; color:var(--mut); margin:8px 2px -4px; letter-spacing:.01em; cursor:pointer; user-select:none; }
  .section:first-child{ margin-top:0; }
  .section:hover{ color:var(--txt); }
  .section .ic{ width:15px; height:15px; opacity:.65; }
  .section .secn{ font-weight:600; color:var(--faint); background:rgba(20,20,45,.06); border-radius:980px; padding:1px 8px; font-size:11px; }
  .seccaret{ display:inline-flex; align-items:center; transition:transform .2s ease; margin-right:-2px; }
  .seccaret .ic{ width:14px; height:14px; opacity:.55; }
  .section.collapsed .seccaret{ transform:rotate(-90deg); }
  .bots{ display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 10px; }
  .botchip{ display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; text-decoration:none; color:#0088cc; background:rgba(0,136,204,.10); border-radius:980px; padding:4px 10px; }
  .botchip:hover{ background:rgba(0,136,204,.18); }
  .botchip .ic{ width:13px; height:13px; }
  .botchip .bdot{ width:7px; height:7px; border-radius:50%; background:#c7c7cc; flex:0 0 auto; }
  .botchip.on .bdot{ background:var(--green); } .botchip.off .bdot{ background:var(--faint); } .botchip.unk .bdot{ background:#e8a33d; }
  .agentb{ display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:var(--accent); background:rgba(254,127,45,.10); border-radius:980px; padding:2px 8px; flex:0 0 auto; }
  .agentb .ic{ width:12px; height:12px; }
  .hostb.hostbtn{ border:none; cursor:pointer; font-family:inherit; } .hostb.hostbtn:hover{ background:#dcdce0; }
  .agentb.agentbtn{ border:none; cursor:pointer; font-family:inherit; } .agentb.agentbtn:hover{ filter:brightness(.96); }
  .tunwrap{ position:relative; display:inline-flex; }
  .tunmenu{ left:0; right:auto; top:auto; bottom:calc(100% + 6px); min-width:240px; }
  .menucap{ font-size:11px; color:var(--faint); padding:5px 10px 3px; font-weight:600; }
  /* спотлайт-блик, следующий за курсором (живой эффект, как pletor) */
  .card::after{ content:""; position:absolute; inset:0; z-index:0; pointer-events:none; opacity:0; transition:opacity .35s;
    background:radial-gradient(260px circle at var(--mx,50%) var(--my,50%), rgba(254,127,45,.13), transparent 46%); }
  .card:hover::after{ opacity:1; }
  .card>*{ position:relative; z-index:1; }
  .card::before{ content:""; position:absolute; left:0; top:0; right:0; height:3px; background:var(--faint); opacity:.35; z-index:2; }
  .card.up::before{ background:linear-gradient(90deg,var(--teal) 0%,var(--teal) 42%,var(--teal-neon) 58%,var(--teal-neon) 100%); opacity:.95; }
  .card.down::before{ background:linear-gradient(90deg,var(--red),#ff8a80); opacity:.9; }
  .top{ display:flex; align-items:center; gap:10px; }
  .pulse{ width:12px; height:12px; border-radius:50%; flex:0 0 auto; background:#c7c7cc; position:relative; }
  .pulse.up{ background:var(--teal-neon); }
  .pulse.down{ background:var(--red); }
  .pulse.up::after{ content:""; position:absolute; inset:-5px; border-radius:50%; border:2px solid var(--teal-neon);
    opacity:.5; animation:ring 2s ease-out infinite; }
  @keyframes ring{ 0%{ transform:scale(.6); opacity:.6 } 100%{ transform:scale(1.5); opacity:0 } }
  .name{ font-weight:650; font-size:15.5px; letter-spacing:-.01em; }
  .state{ font-size:11.5px; font-weight:600; padding:3px 9px; border-radius:980px; }
  .state.up{ color:var(--green-d); background:rgba(33,94,97,.16); }
  .state.down{ color:#b3261e; background:rgba(255,59,48,.12); }
  .hostb{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:3px 8px; border-radius:980px; background:var(--bg2); color:var(--mut); flex:0 0 auto; }
  .hostb .ic{ width:12px; height:12px; }
  .card.disc{ border-style:dashed; box-shadow:none; padding:14px 16px; }
  .card.disc:hover{ --lift:-3px; box-shadow:var(--shadow); }
  .card.disc .cmd{ font-weight:600; font-size:14px; } .card.disc .pid{ color:var(--faint); font-size:11px; }
  .thumb .reload{ position:absolute; left:8px; bottom:8px; background:rgba(0,0,0,.62); color:#fff; border:none;
    width:30px; height:30px; border-radius:9px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
    transition:transform .12s ease, background .15s; }
  .thumb .reload:hover{ background:rgba(0,0,0,.82); transform:scale(1.08); }
  .thumb .reload:active{ transform:scale(.9); }
  .thumb .reload .ic{ width:15px; height:15px; }
  .kebab{ border:none; background:transparent; color:var(--faint); cursor:pointer; font-size:17px; padding:2px 4px;
    border-radius:7px; line-height:1; }
  .kebab:hover{ background:var(--bg2); color:var(--txt); }
  .menu{ position:absolute; right:14px; top:42px; background:#fff; border:1px solid var(--line); border-radius:12px;
    box-shadow:var(--shadow-h); padding:5px; z-index:40; display:none; min-width:170px; }
  .menu.open{ display:block; }
  .menu button{ display:block; width:100%; text-align:left; border:none; background:none; padding:8px 10px;
    border-radius:8px; font-size:13px; cursor:pointer; color:var(--txt); font-family:inherit; }
  .menu button:hover{ background:var(--bg2); }
  .menu button.del{ color:var(--red); }
  .note{ color:#48484a; font-size:12.5px; margin:8px 0; line-height:1.5; }
  .urls{ display:flex; flex-direction:column; gap:6px; margin-bottom:11px; }
  .urlrow{ display:flex; align-items:center; gap:6px; }
  .urlrow a{ color:var(--blue); text-decoration:none; font-size:13px; word-break:break-all; flex:1; }
  .urlrow a:hover{ text-decoration:underline; }
  .badge{ font-size:11px; font-weight:600; color:var(--mut); background:var(--bg2); padding:3px 8px; border-radius:980px; flex:0 0 auto; }
  .tag{ font-size:10px; padding:2px 7px; border-radius:6px; background:var(--bg2); color:var(--faint); flex:0 0 auto; }
  .icbtn{ border:none; background:rgba(20,20,45,.06); border-radius:8px; width:28px; height:26px; cursor:pointer;
    font-size:12px; color:var(--mut); flex:0 0 auto; transition:.15s; }
  .icbtn:hover{ background:var(--accent); color:#fff; }
  .row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .btn{ border:none; border-radius:980px; padding:8px 15px; font-size:13px; font-weight:550; cursor:pointer;
    transition:transform .12s ease, background .2s; font-family:inherit; }
  .btn:active{ transform:scale(.95); }
  .btn-primary{ background:var(--accent); color:#fff; box-shadow:0 2px 10px rgba(254,127,45,.32); }
  .btn-primary:hover{ background:var(--accent-d); }
  .btn-soft{ background:rgba(20,20,45,.06); color:var(--txt); } .btn-soft:hover{ background:rgba(20,20,45,.11); }
  .btn-danger{ background:rgba(255,69,58,.12); color:var(--red); } .btn-danger:hover{ background:rgba(255,69,58,.2); }
  .btn-ghost{ background:transparent; color:var(--mut); padding:8px 12px; } .btn-ghost:hover{ color:var(--blue); background:var(--bg2); }
  /* система иконок (SVG, не эмодзи) */
  .ic{ width:15px; height:15px; flex:0 0 auto; display:inline-block; vertical-align:-2px; }
  .btn{ display:inline-flex; align-items:center; gap:6px; }
  .icbtn{ display:inline-flex; align-items:center; justify-content:center; } .icbtn .ic{ width:14px; height:14px; }
  .kebab{ display:inline-flex; align-items:center; } .kebab .ic{ width:17px; height:17px; }
  .menu button{ display:flex; align-items:center; gap:8px; } .menu button .ic{ width:14px; height:14px; }
  .spin{ animation:spin 1s linear infinite; } @keyframes spin{ to{ transform:rotate(360deg); } }
  /* a11y: видимый фокус */
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible{ outline:2px solid var(--blue); outline-offset:2px; }
  /* профессиональный бейдж категории: точка + иконка + подпись */
  .catb{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; padding:4px 10px 4px 8px; border-radius:980px;
    background:var(--cat-bg); color:color-mix(in srgb, var(--cat) 72%, #1d1d1f); --ic:var(--cat);
    box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--cat) 22%, transparent); }
  .catb .ic{ width:13px; height:13px; }
  .catb .dot{ width:6px; height:6px; border-radius:50%; flex:0 0 auto; background:var(--cat); }
  .catb.catbtn{ border:none; cursor:pointer; font-family:inherit; }
  .catb.catbtn:hover{ filter:brightness(.96); }
  .catb .caret{ font-size:9px; opacity:.6; margin-left:1px; }
  .catmenu{ max-height:300px; overflow-y:auto; }
  .guard{ display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:700; color:var(--red); margin-left:8px; letter-spacing:.01em; }
  .guard .ic{ width:12px; height:12px; }
  .card.disc.guarded{ border-color:rgba(255,69,58,.45); }
  .tag{ display:inline-flex; align-items:center; gap:4px; } .tag .ic{ width:11px; height:11px; }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } .card:hover{ transform:none; } }
  /* акцент-кнопка (Public link, Preview) — мягкая заливка, БЕЗ рамки */
  .btn-accent{ background:var(--soft); color:var(--txt); }
  .btn-accent:hover{ background:var(--soft-h); }
  .btn .ic{ opacity:.92; }
  /* :port — технический идентификатор, моноширинный, нейтральный */
  .badge{ font-family:ui-monospace,"SF Mono",Menlo,monospace; background:rgba(20,20,45,.06); color:var(--mut); letter-spacing:-.02em; }
  .prevwrap{ margin-top:11px; border-radius:14px; overflow:hidden; border:1px solid var(--line);
    background:var(--bg2); height:0; opacity:0; transition:height .3s ease, opacity .3s ease; }
  .prevwrap.open{ height:188px; opacity:1; }
  .prevwrap.open.has-hint{ height:226px; }
  .prevhint{ display:flex; align-items:center; gap:5px; padding:7px 10px; font-size:11px; color:var(--mut); line-height:1.35; background:rgba(255,255,255,.5); }
  .prevhint .ic{ width:12px; height:12px; opacity:.55; flex:0 0 auto; }
  .prevhint a{ color:var(--blue); text-decoration:none; white-space:nowrap; }
  .thumb{ position:relative; width:100%; height:188px; cursor:zoom-in; }
  .thumb iframe{ position:absolute; top:0; left:0; width:1320px; height:825px; transform:scale(.235);
    transform-origin:top left; border:0; pointer-events:none; background:#fff; }
  .thumb .expand{ position:absolute; right:8px; bottom:8px; background:rgba(0,0,0,.6); color:#fff;
    font-size:11px; padding:3px 8px; border-radius:7px; }
  /* оверлей превью: пока iframe грузится — «Загрузка», если сервис блокирует встраивание —
     наше спокойное объяснение (а НЕ нативная браузерная ошибка, которая выглядит как наша поломка) */
  .thumb .prevover{ position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:8px; padding:14px 18px; color:var(--mut); background:linear-gradient(180deg,#f5f6fa,#e8eaf1); }
  .thumb .prevover .po-block{ display:none; flex-direction:column; align-items:center; gap:6px; }
  .thumb .prevover[data-state="blocked"] .po-load{ display:none; }
  .thumb .prevover[data-state="blocked"] .po-block{ display:flex; }
  .po-load{ display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--faint); }
  .po-ico{ width:36px; height:36px; border-radius:11px; background:rgba(33,94,97,.14); color:var(--teal-d);
    display:inline-flex; align-items:center; justify-content:center; }
  .po-ico .ic{ width:19px; height:19px; }
  .po-t{ font-weight:650; font-size:13px; color:var(--txt); }
  .po-d{ font-size:11.5px; line-height:1.45; max-width:270px; }
  .po-btn{ margin-top:3px; font-size:12px; padding:6px 13px; }

  .modal{ position:fixed; inset:0; background:rgba(0,0,0,.55); backdrop-filter:blur(6px); display:none;
    align-items:center; justify-content:center; z-index:50; padding:24px; }
  .modal.show{ display:flex; }
  .mbox{ background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.4); display:flex; flex-direction:column; }
  .mbox.viewer{ width:min(1200px,95vw); height:min(800px,90vh); }
  .mbox.form{ width:min(460px,95vw); padding:0; }
  .mbox.info{ width:min(480px,95vw); padding:0; }
  .wi-prompt{ width:100%; min-height:82px; border:1px solid var(--line); border-radius:11px; padding:10px 12px;
    font-size:12.5px; font-family:inherit; line-height:1.45; color:var(--txt); background:var(--bg2); resize:vertical; outline:none; }
  .wi-prompt:focus{ border-color:var(--blue); box-shadow:0 0 0 4px rgba(33,94,97,.2); }
  .wi-ask{ display:flex; align-items:center; justify-content:space-between; font-size:12px; color:var(--mut); margin-bottom:5px; }
  .mg-guess{ font-size:11.5px; color:var(--teal-d); margin-top:5px; line-height:1.35; font-weight:600; }
  .mbar{ display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--line); }
  .mbar .t{ font-weight:650; font-size:15px; } .mbar a{ color:var(--blue); font-size:12px; text-decoration:none; }
  .mbox.viewer iframe{ flex:1; border:0; width:100%; }
  .fbody{ padding:18px; display:flex; flex-direction:column; gap:11px; }
  .fbody label{ font-size:12px; color:var(--mut); display:block; margin-bottom:4px; }
  .fbody input, .fbody select{ width:100%; border:1px solid var(--line); border-radius:11px; padding:10px 12px;
    font-size:14px; font-family:inherit; outline:none; }
  .fbody input:focus{ border-color:var(--blue); box-shadow:0 0 0 4px rgba(33,94,97,.2); }
  .frow{ display:flex; gap:10px; } .frow>div{ flex:1; }
  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(10px);
    background:rgba(30,30,32,.95); color:#fff; padding:11px 18px; border-radius:12px; font-size:13px;
    opacity:0; transition:.25s; pointer-events:none; box-shadow:0 8px 30px rgba(0,0,0,.3); z-index:60; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .caret{ font-size:9px; opacity:.5; margin-left:1px; }
  .empty{ grid-column:1/-1; text-align:center; padding:46px 20px; background:var(--glass); border:1px dashed var(--glass-brd); border-radius:var(--r); }
  .emptyt{ font-weight:650; font-size:16px; color:var(--txt); }
  .emptyh{ color:var(--mut); font-size:13px; margin-top:6px; line-height:1.5; }
  @media (max-width:560px){
    body{ padding:16px 12px 60px; }
    header{ padding:14px 16px; gap:12px; }
    h1{ font-size:22px; }
    .grid{ grid-template-columns:1fr; gap:14px; }
    .search{ flex:1 1 100%; } .search input,.search input:focus{ width:100%; }
    .ctl{ flex-wrap:wrap; }
    .frow{ flex-direction:column; }
    .mbox.viewer{ width:100vw; height:100vh; border-radius:0; }
    .lvgrid{ grid-template-columns:1fr !important; }
    #livebar{ gap:7px; }
  }
  /* ── Live view (стена живых превью) ── */
  #livebar, #live{ display:none; }
  body.live #livebar{ display:flex; } body.live #live{ display:grid; }
  body.live #grid, body.live #disc-wrap, body.live #selftun, body.live #platwarn{ display:none !important; }
  #livebar{ max-width:1180px; margin:0 auto 14px; align-items:center; gap:10px; flex-wrap:wrap; position:relative; z-index:30;
    background:var(--glass-strong); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
    border:1px solid var(--glass-brd); border-radius:16px; padding:8px 14px; box-shadow:var(--shadow); }
  .lvsub{ font-size:12px; color:var(--faint); }
  .lvseg{ display:inline-flex; background:rgba(20,20,45,.06); border-radius:980px; padding:2px; }
  .lvseg button{ border:none; background:none; padding:5px 11px; border-radius:980px; font:inherit; font-size:13px; cursor:pointer; color:var(--mut); }
  .lvseg button.on{ background:#fff; color:var(--txt); box-shadow:0 1px 4px rgba(0,0,0,.08); font-weight:650; }
  .lvpickwrap{ position:relative; }
  .lvpick{ position:absolute; right:0; top:115%; z-index:200; background:#fff; border:1px solid var(--line); border-radius:14px;
    box-shadow:var(--shadow-h); padding:8px; min-width:260px; max-height:60vh; overflow:auto; display:none; }
  .lvpick.open{ display:block; }
  .lvpick label{ display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:9px; cursor:pointer; font-size:13px; color:var(--txt); }
  .lvpick label:hover{ background:rgba(20,20,45,.05); }
  .lvpick .dot{ width:8px; height:8px; border-radius:50%; background:#c7c7cc; flex:0 0 auto; } .lvpick .dot.up{ background:var(--teal-neon); }
  .lvgrid{ max-width:1180px; margin:0 auto; padding-bottom:30px; gap:14px; align-content:start; grid-template-columns:repeat(var(--lvcols,2),1fr); }
  .lvtile{ background:var(--glass); border:1px solid var(--glass-brd); border-radius:16px; overflow:hidden; display:flex; flex-direction:column;
    min-height:var(--lvtileh,420px); box-shadow:var(--shadow); }
  .lvtbar{ display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--line); flex:0 0 auto; }
  .lvtbar .pulse{ width:9px; height:9px; border-radius:50%; background:#c7c7cc; flex:0 0 auto; } .lvtbar .pulse.up{ background:var(--teal-neon); } .lvtbar .pulse.down{ background:var(--red); }
  .lvtbar .nm{ font-weight:650; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lvtbar .pt{ font-size:11px; color:var(--faint); font-family:ui-monospace,Menlo,monospace; }
  .lvtbar a{ color:var(--blue); font-size:12px; text-decoration:none; }
  .lvtbar .x{ border:none; background:rgba(20,20,45,.06); width:24px; height:24px; border-radius:7px; cursor:pointer; color:var(--mut); display:inline-flex; align-items:center; justify-content:center; }
  .lvtbar .x:hover{ background:var(--red); color:#fff; } .lvtbar .x .ic{ width:13px; height:13px; }
  .lvframe{ position:relative; flex:1; background:var(--bg2); overflow:hidden; }
  .lvframe iframe{ position:absolute; top:0; left:0; width:calc(100%/var(--lvzoom,.75)); height:calc(100%/var(--lvzoom,.75));
    border:0; background:#fff; transform:scale(var(--lvzoom,.75)); transform-origin:top left; }
  .lvov{ position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:9px; text-align:center; color:var(--mut); font-size:13px; padding:0 26px; background:var(--bg2); }
  .lvframe.lvloading .lvov.load{ display:flex; } .lvframe.lvblocked .lvov.block{ display:flex; }
  .lvov.block .ic{ width:32px; height:32px; opacity:.5; }
  .lvspin{ width:26px; height:26px; border:3px solid rgba(20,20,45,.12); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; }
  .lvov .bt{ font-weight:650; color:var(--txt); font-size:14px; } .lvov .bb{ max-width:330px; line-height:1.45; }
  .lvempty{ grid-column:1/-1; text-align:center; color:var(--mut); padding:60px 20px; line-height:1.6; }

<body>
  <header>
    <img class="logo" src="/logo.png" alt="AI Garage" onerror="this.remove()"/>
    <div class="brandblock">
      <h1 class="rounded brand">AI Garage</h1>
      <div class="sub"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="opacity:.5;vertical-align:-2px"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg> 3s · <span id="ts"></span></div>
      <div class="legend">
        <div><span class="ld" style="background:var(--teal-neon)"></span> <span id="upc">0</span> <span data-i="working">работает</span></div>
        <div><span class="ld" style="background:var(--red)"></span> <span id="downc">0</span> <span data-i="stopped">выключено</span></div>
      </div>
    </div>
    <div class="ring">
      <svg width="80" height="80"><defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#215e61"/><stop offset="100%" stop-color="#1ce5e8"/></linearGradient></defs><circle cx="40" cy="40" r="34" fill="none" stroke="#e6e6ea" stroke-width="8"/>
        <circle id="arc" cx="40" cy="40" r="34" fill="none" stroke="var(--teal-neon)" stroke-width="8"
          stroke-linecap="round" stroke-dasharray="214" stroke-dashoffset="214"/></svg>
      <div class="num rounded"><b id="upn">0</b><span><span data-i="of">of</span> <span id="totn">0</span></span></div>
    </div>
    <div class="spacer"></div>
    <div class="ctl">
      <button class="pausebtn" id="modebtn" onclick="setMode(MODE==='live'?'list':'live')" title="Список ⇄ Live view"></button>
      <button class="btn-add" onclick="openForm()" data-i="addService">+ Сервис</button>
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input class="field" id="q" oninput="render()"/>
      </div>
      <button class="pausebtn" id="phonebtn" onclick="openPhone()" aria-label="phone"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect x="7" y="2" width="10" height="20" rx="2.5"/><line x1="11" y1="18" x2="13" y2="18"/></svg> <span data-i="phoneBtn">Телефон</span> <span style="font-size:9px;font-weight:800;letter-spacing:.03em;color:#fff;background:var(--accent);border-radius:5px;padding:1px 5px;vertical-align:1px">PRO</span></button>
      <select class="field" id="lang" onchange="setLang(this.value)"></select>
      <button class="pausebtn" id="pause" aria-label="пауза" onclick="togglePause()"></button>
    </div>
  </header>

  <div id="platwarn" style="display:none;max-width:1180px;margin:0 auto 16px;background:rgba(255,159,10,.12);border:1px solid rgba(255,159,10,.3);border-radius:14px;padding:12px 16px;font-size:13px;color:#9a6a00"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px"><path d="M10.3 3.6 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.6a2 2 0 0 0-3.4 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg> <span data-i="macOnly">AI Garage рассчитан на macOS.</span></div>

  <div id="selftun" style="display:none;max-width:1180px;margin:0 auto 16px;background:rgba(255,159,10,.13);border:1px solid rgba(255,159,10,.32);border-radius:14px;padding:10px 14px;font-size:13px;color:#9a6a00"></div>

  <div id="livebar">
    <span class="lvsub" data-i="lvCols">колонки</span>
    <div class="lvseg" id="lvcols"><button data-c="1">1</button><button data-c="2" class="on">2</button><button data-c="3">3</button><button data-c="4">4</button></div>
    <span class="lvsub" data-i="lvZoom">зум</span>
    <div class="lvseg"><button id="lvzout" title="−">−</button><span id="lvzlbl" style="padding:5px 7px;font-size:13px;font-weight:650;min-width:44px;text-align:center">75%</span><button id="lvzin" title="+">+</button></div>
    <span class="spacer"></span>
    <span class="lvsub" id="lvcnt"></span>

    <button class="btn btn-soft" id="lvfsbtn" onclick="lvToggleFS()">⛶ <span id="lvfslbl" data-i="lvFull">Во весь экран</span></button>
  </div>
  <div class="lvgrid" id="live"></div>

  <div class="grid" id="grid"></div>

  <div id="disc-wrap" style="max-width:1180px;margin:26px auto 0;display:none">

      <span class="seccaret"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="opacity:.6;vertical-align:-2px"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg> <span data-i="discovered">Обнаружено</span> · <span id="disc-n"></span> <span style="color:var(--faint)" data-i="discHint">(запущено, но не сохранено)</span></div>
    <div class="grid" id="disc-grid"></div>
  </div>

  <div class="modal" id="viewer" onclick="if(event.target===this)closeViewer()">

      <iframe id="v-frame" sandbox="allow-same-origin allow-scripts allow-forms" src="about:blank"></iframe>
    </div>
  </div>

  <!-- модалка-форма добавления -->
  <div class="modal" id="formModal" onclick="if(event.target===this)closeForm()">
    <div class="mbox form">
      <div class="mbar"><span class="t" data-i="addService">+ Сервис</span></div>
      <div class="fbody">
        <div><label data-i="fName">Название</label><input id="f-name" placeholder="My App"/></div>
        <div class="frow">
          <div><label data-i="fType">Тип</label><select id="f-type" onchange="toggleCmd()">
            <option value="local" data-i="fTypeLocal">локальный (с кнопками)</option>
            <option value="link" data-i="fTypeLink">ссылка (только статус)</option></select></div>
          <div><label data-i="fPort">Порт</label><input id="f-port" type="number" placeholder="3000"/></div>
        </div>
        <div><label>URL</label><input id="f-url" placeholder="http://localhost:3000"/></div>
        <div><label data-i="fHost">Устройство (Mac / VPS / своё)</label>
          <input id="f-host" list="hostlist" placeholder="Mac"/>
          <datalist id="hostlist"><option value="Mac"></option><option value="VPS"></option></datalist></div>
        <div id="cmd-fields">
          <div><label data-i="fStart">Команда старта</label><input id="f-start" placeholder="npm run dev"/></div>
          <div class="frow">
            <div><label data-i="fStop">Команда стопа</label><input id="f-stop" placeholder="lsof -ti:3000 | xargs kill"/></div>
            <div><label data-i="fCwd">Папка</label><input id="f-cwd" placeholder="~/projects/app"/></div>
          </div>
        </div>
        <div><label data-i="fNote">Заметка</label><input id="f-note" placeholder=""/></div>
        <div class="row" style="justify-content:flex-end; margin-top:4px">
          <button class="btn btn-soft" onclick="closeForm()" data-i="cancel">Отмена</button>
          <button class="btn btn-primary" onclick="saveService()" data-i="save">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

  <!-- модалка «что это?» -->
  <div class="modal" id="whatisModal" onclick="if(event.target===this)closeWhatIs()">
    <div class="mbox info">
      <div class="mbar"><span class="t" id="wi-title"></span><div class="spacer"></div>
        <button class="btn btn-soft" onclick="closeWhatIs()" data-i="close">Закрыть</button></div>
      <div class="fbody" id="wi-body"></div>
    </div>
  </div>

  <!-- модалка «Доступ с телефона» -->
  <div class="modal" id="phoneModal" onclick="if(event.target===this)closePhone()">
    <div class="mbox info">
      <div class="mbar"><span class="t" data-i="phoneTitle">Доступ с телефона</span><div class="spacer"></div>
        <button class="btn btn-soft" onclick="closePhone()" data-i="close">Закрыть</button></div>
      <div class="fbody" id="phone-body"></div>
    </div>
  </div>

    <div class="mbox form">
      <div class="mbar"><span class="t" id="mg-title"></span><div class="spacer"></div>
        <button class="btn btn-soft" onclick="closeManage()" data-i="cancel">Отмена</button></div>
      <div class="fbody" id="mg-body"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

function token(){ return localStorage.getItem('lc-token')||''; }
async function api(path,body){
  const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json','x-control-token':token()},body:JSON.stringify(body||{})});
  if(r.status===401){ const tk=prompt(t('tokenPrompt')); if(tk){ localStorage.setItem('lc-token',tk); return api(path,body);} toast(t('needToken')); return {ok:false}; }
  return r.json();
}

/* ── Доступ с телефона ── */
/* токен из #token (пришёл по QR) → в localStorage, и сразу убрать из URL (на сервер/в логи не попадает) */
(function(){ try{ const m=location.hash.match(/(?:^|[#&])token=([^&]+)/); if(m){ localStorage.setItem('lc-token',decodeURIComponent(m[1])); history.replaceState(null,'',location.pathname+location.search); } }catch(e){} })();
function qrSvg(text){ try{ const q=qrcode(0,'M'); q.addData(text); q.make(); return q.createSvgTag({cellSize:5,margin:2,scalable:true}); }catch(e){ return ''; } }
function phoneLink(base){ const tok=LAST_TOKEN||token(); const b=String(base).replace(/\/$/,''); return tok? b+'/#token='+encodeURIComponent(tok) : b; }   // токен в #fragment: на сервер не уходит, авто-логинит телефон
function qrBlock(url){ const link=phoneLink(url); const svg=(typeof qrcode!=='undefined')?qrSvg(link):'';
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:9px;margin-top:10px">
    <div style="width:188px;height:188px;background:#fff;border-radius:14px;padding:9px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center">${svg||'QR'}</div>
    <a href="${safeUrl(url)}" target="_blank" rel="noopener" style="color:var(--blue);word-break:break-all;text-align:center;font-size:13px">${esc(url)}</a>
    <div class="note" style="margin:0;text-align:center">${t('scanQr')}</div></div>`; }
function modeBtn(m,k){ const on=ACCESS===m; return `<button class="btn ${on?'btn-primary':'btn-soft'}" onclick="setAccess('${m}')">${on?icon('shield')+' ':''}${t(k)}</button>`; }
async function setAccess(mode){ toast('…'); const j=await api('/api/access',{mode});
  if(!j||!j.ok){ toast('⛔️ '+((j&&j.error)||'')); return; }
  if(j.token){ LAST_TOKEN=j.token; try{ localStorage.setItem('lc-token',j.token); }catch(e){} }
  if(typeof j.tsIp!=='undefined') TS_IP=j.tsIp; ACCESS=mode;
  toast('✅ '+(j.note||'')); renderPhone(); lastSig=''; setTimeout(load,900); }
function renderPhone(){ const b=$('phone-body'); if(!b) return;
  let h=`<div class="note" style="margin:0 0 4px">${t('phoneIntro')}</div>
    <div class="row" style="gap:8px">${modeBtn('off','modeOff')}${modeBtn('tailscale','modeTs')}${modeBtn('public','modePublic')}</div>`;
  if(ACCESS==='tailscale'){ const base=LAN_URL||(TS_IP?`http://${TS_IP}:7777`:null);
    if(base){ h+=`<div class="note">${t('tsHint')}</div>`+qrBlock(base); if(!LAN_URL) h+=`<div class="note" style="color:#9a6a00">${icon('warn')} ${t('restartApply')}</div>`; }
    else h+=`<div class="note" style="color:var(--red)">${icon('warn')} ${t('tsMissing')}</div>`; }
  else if(ACCESS==='public'){ if(SELF_TUNNEL){ h+=`<div class="note">${t('publicHint')}</div>`+qrBlock(SELF_TUNNEL);
      const tok=LAST_TOKEN||token(); if(tok) h+=`<div class="urlrow" style="margin-top:6px"><span class="tag">${t('tokenLabel')}</span><code style="flex:1;word-break:break-all;font-size:12px">${esc(tok)}</code><button class="icbtn" onclick="copy('${jsq(tok)}')">${icon('copy')}</button></div>`; }
    else h+=`<div class="note">${icon('spin','spin')} ${t('tunnelUp')}</div>`; }
  b.innerHTML=h; }
function openPhone(){ renderPhone(); $('phoneModal').classList.add('show'); }
function closePhone(){ $('phoneModal').classList.remove('show'); }

/* ── Live view: стена живых превью (переключаемый режим, тот же порт 7777) ── */
let MODE=localStorage.getItem('lc-mode')||'list';
let lvChosen=new Set(), lvZoom=.75, lvReady=false, lvMemSig=''; const LV_KEY='lc-wall-chosen';
const lvServices=()=>DATA.filter(s=>s.url);
function setMode(m){ MODE=m; localStorage.setItem('lc-mode',m); document.body.classList.toggle('live',m==='live');
  const mb=$('modebtn'); if(mb) mb.innerHTML=(m==='live'?icon('server')+' '+t('modeList'):icon('eye')+' '+t('modeLive'));
  closeMenus();
  if(m==='live' && DATA.length && !lvReady){ lvReady=true; buildWall(); } }
function buildWall(){ const all=lvServices();
  const saved=JSON.parse(localStorage.getItem(LV_KEY)||'null');
  lvChosen = saved ? new Set(saved) : new Set(all.filter(s=>s.up).map(s=>s.name));   // первый раз — все запущенные
  lvChosen = new Set([...lvChosen].filter(n=>all.some(s=>s.name===n)));
  renderLvPick(); renderWall(); }
function renderLvPick(){ const p=$('lvpick'); if(!p) return;
  p.innerHTML=lvServices().map(s=>`<label><input type="checkbox" ${lvChosen.has(s.name)?'checked':''} onchange="toggleLvSvc('${jsq(s.name)}',this.checked)"><span class="dot ${s.up?'up':''}"></span>${esc(s.name)}<span class="pt" style="margin-left:auto;color:var(--faint)">:${s.port||'—'}</span></label>`).join('')||`<div style="padding:10px;color:var(--faint)">${t('emptyTitle')}</div>`; }
function toggleLvSvc(name,on){ on?lvChosen.add(name):lvChosen.delete(name); localStorage.setItem(LV_KEY,JSON.stringify([...lvChosen])); renderWall(); }
function lvTile(s){ const u=safeUrl(s.url);
  return `<div class="lvtile">
    <div class="lvtbar"><span class="pulse ${s.up?'up':'down'}"></span>
      <span class="nm" title="${esc(s.name)}">${esc(s.name)}</span><span class="pt">:${s.port||''}</span>
      <span class="spacer" style="flex:1"></span>
      <a href="${u}" target="_blank" rel="noopener">${t('openTab')}</a>
      <button class="x" title="${esc(t('exposedOff'))}" onclick="toggleLvSvc('${jsq(s.name)}',false)">${icon('x')}</button></div>
    <div class="lvframe lvloading" data-port="${s.port||''}" data-name="${esc(s.name)}">
      <iframe sandbox="allow-same-origin allow-scripts allow-forms" src="${u}" loading="lazy"></iframe>
      <div class="lvov load"><div class="lvspin"></div>${t('prevLoading')}</div>
      <div class="lvov block">${icon('monitor')}<div class="bt">${t('blockedTitle')}</div><div class="bb">${t('blockedBody')}</div>
        <a class="btn btn-accent" href="${u}" target="_blank" rel="noopener" style="margin-top:4px">${icon('link')} ${t('openTab')}</a></div>
    </div></div>`; }
function renderWall(){ const g=$('live'); if(!g) return; const list=lvServices().filter(s=>lvChosen.has(s.name));
  lvMemSig=list.map(s=>s.name).join('|');
  const c=$('lvcnt'); if(c) c.textContent=list.length?list.length+' '+t('lvOnWall'):'';
  g.innerHTML=list.length?list.map(lvTile).join(''):`<div class="lvempty">${t('lvEmpty')}</div>`;
  setupLvFrames(); }
function setupLvFrames(){ document.querySelectorAll('#live .lvframe').forEach(fr=>{
  const f=fr.querySelector('iframe'); if(!f||fr.dataset.set) return; fr.dataset.set='1';
  const port=fr.dataset.port;
  // ИСТОЧНИК ПРАВДЫ — can-embed (same-origin, надёжно). blocked СТРОГО по embeddable:false; НИКАКОГО таймаута
  // (иначе медленный сервис вроде Hermes ложно метится «заблокирован»). embeddable:true → держим спиннер сколько надо.
  if(port) fetch('/api/can-embed?port='+port).then(r=>r.json()).then(j=>{ if(j&&j.embeddable===false){ fr.classList.remove('lvloading'); fr.classList.add('lvblocked'); } }).catch(()=>{});
  f.addEventListener('load',()=>{ if(!fr.classList.contains('lvblocked')){ fr.classList.remove('lvloading'); fr.classList.add('lvloaded'); } });
}); }
function lvApplyZoom(){ document.documentElement.style.setProperty('--lvzoom',lvZoom); const l=$('lvzlbl'); if(l) l.textContent=Math.round(lvZoom*100)+'%'; }
function lvToggleFS(){ const el=$('live'); if(document.fullscreenElement){ document.exitFullscreen&&document.exitFullscreen(); } else if(el&&el.requestFullscreen){ el.requestFullscreen(); } }
function lvOnPoll(){ if(MODE!=='live') return;
  if(!lvReady){ if(DATA.length){ lvReady=true; buildWall(); } return; }
  renderLvPick();                                            // освежить точки/список в пикере (без трогания iframe)
  const list=lvServices().filter(s=>lvChosen.has(s.name));
  const sig=list.map(s=>s.name).join('|');
  if(sig!==lvMemSig){ renderWall(); }                        // изменился состав стены → пересобрать
  else list.forEach(s=>{ const fr=document.querySelector(`#live .lvframe[data-name="${CSS.escape(s.name)}"]`); if(fr){ const p=fr.parentNode.querySelector('.pulse'); if(p) p.className='pulse '+(s.up?'up':'down'); } }); }

const SYS_PORTS={5432:'PostgreSQL',3306:'MySQL',27017:'MongoDB',6379:'Redis',5984:'CouchDB'};
async function killPort(port){
  const danger = port<1024 ? t('sysPort') : (SYS_PORTS[port]||'');
  const msg = danger ? t('killDanger').replace('{p}',port).replace('{d}',danger) : t('killSafe').replace('{p}',port);
  if(!confirm(msg)) { closeMenus(); return; }
  const j=await api('/api/kill-port',{port}); toast(j.ok?'✅ '+(j.note||''):'⛔️ '+(j.error||'')); closeMenus(); setTimeout(load,800); }
async function tunnelStart(port,provider){ toast(t('tunnelUp')); const j=await api('/api/tunnel-start',{port,provider:provider||'cloudflared'}); toast(j.ok?'✅ '+(j.note||''):'⛔️ '+(j.error||'')); lastSig=''; setTimeout(load,1500); }

async function tunnelStop(port){ const j=await api('/api/tunnel-stop',{port}); toast(j.ok?'✅ '+(j.note||''):'⛔️ '+(j.error||'')); lastSig=''; setTimeout(load,600); }
function tunnelBtn(port,managed,url,err){ if(!port) return '';

  return `<span class="tunwrap"><button class="btn btn-accent" title="${esc(t('tunnelHint'))}" onclick="toggleMenu(event,'tun:${port}')">${icon('link')} ${t('tunnelStart')}</button>
    <div class="menu tunmenu" data-menu="tun:${port}">
      <div class="menucap">${t('provPick')}</div>
      <button onclick="closeMenus();tunnelStart(${port},'cloudflared')">${icon('cloud')} ${t('provCf')}</button>
      <button onclick="closeMenus();provSoon()">${icon('link')} ${t('provNgrok')}</button>
      <button onclick="closeMenus();provSoon()">${icon('monitor')} ${t('provDomain')}</button></div></span>`; }
async function delService(name){ if(!confirm(t('confirmDel')))return; const j=await api('/api/service-remove',{name}); toast(j.ok?'✅':'⛔️'); lastSig=''; load(); }
async function renameService(name){ const nn=prompt(t('renamePrompt'),name); if(nn===null)return; const v=nn.trim(); if(!v||v===name){closeMenus();return;} const j=await api('/api/service-rename',{name,newName:v}); toast(j.ok?'✅ '+(j.note||''):'⛔️ '+(j.error||'')); closeMenus(); lastSig=''; load(); }
async function setHost(name,host){ const j=await api('/api/service-sethost',{name,host}); toast(j.ok?'✅ '+(j.note||''):'⛔️ '+(j.error||'')); closeMenus(); lastSig=''; load(); }
async function setHostPrompt(name){ const cur=(DATA.find(x=>x.name===name)||{}).host||''; const h=prompt(t('changeHost'),cur); closeMenus(); if(h===null)return; const v=h.trim(); if(!v)return; setHost(name,v); }
async function setAgent(name){ const cur=(DATA.find(x=>x.name===name)||{}).agent||''; const a=prompt(t('agentPrompt'),cur); if(a===null)return; const j=await api('/api/service-setagent',{name,agent:a.trim()}); toast(j.ok?'✅ '+(j.note||''):'⛔️ '+(j.error||'')); lastSig=''; load(); }

/* меню на карточке. ВАЖНО: .card имеет transform + preserve-3d, а .grid — perspective,
   из-за чего position:fixed у вложенного меню отсчитывается ОТ КАРТОЧКИ, а не от экрана,
   и меню уезжает за пределы видимого. Лечится выносом меню в <body> на время показа (портал). */
let _portalMenu=null, _portalHome=null;
function toggleMenu(e,name){ e.stopPropagation();
  const m=document.querySelector(`[data-menu="${CSS.escape(name)}"]`);
  const reopen = m && m===_portalMenu;                 // повторный клик по той же кнопке → закрыть
  closeMenus();
  if(!m || reopen) return;
  _portalMenu=m; _portalHome={parent:m.parentNode, next:m.nextSibling};
  document.body.appendChild(m); m.classList.add('open');
  m.style.position='fixed'; m.style.right='auto'; m.style.bottom='auto';
  const b=(e.currentTarget||e.target).getBoundingClientRect();
  const mh=m.offsetHeight||160, mw=m.offsetWidth||210;
  let top=b.bottom+6; if(top+mh>innerHeight-8) top=Math.max(8,b.top-mh-6);

function dragStart(e){

  // мышь — драг сразу; палец — только после long-press (иначе обычное движение = скролл страницы)

    if(!started){

      started=true; _dragging=true; document.body.classList.add('dragging-active');
      ph=document.createElement('div'); ph.className='card-placeholder'; ph.style.height=rect.height+'px';
      card.parentNode.insertBefore(ph, card);       // placeholder держит место в сетке (она не схлопывается)
      card.classList.add('dragging');
      card.style.width=rect.width+'px'; card.style.height=rect.height+'px';
      card.style.position='fixed'; card.style.left='0'; card.style.top='0'; card.style.margin='0';
      card.style.zIndex='1000'; card.style.pointerEvents='none';

    }
    ev.preventDefault();
    follow(ev.clientX, ev.clientY);                 // карточка плавно следует за курсором (translate3d, GPU)
    const under=document.elementFromPoint(ev.clientX, ev.clientY);
    const tgt=under&&under.closest&&under.closest('#grid .card');
    if(tgt&&tgt!==ph){ const r=tgt.getBoundingClientRect(); const after=(ev.clientY-r.top)/r.height>0.5;
      tgt.parentNode.insertBefore(ph, after?tgt.nextSibling:tgt); }
    autoScroll(ev.clientY);
  };
  const end=()=>{
    // слушатели на WINDOW (а не на карточке): при переносе карточки в <body> capture терялся и pointerup не приходил → drag зависал
    stop();
    stopAutoScroll();
    if(started && ph && ph.parentNode){ ph.parentNode.insertBefore(card, ph); }  // вернуть карточку на место placeholder
    _dragCleanup();
    if(started) persistOrder();
  };
  addEventListener('pointermove',move); addEventListener('pointerup',end);
  addEventListener('pointercancel',end); addEventListener('blur',end);
}

function visible(){ const q=$('q').value.trim().toLowerCase(); return DATA.filter(s=>!q||s.name.toLowerCase().includes(q)); }
/* секции-категории: тонкий заголовок над группой карточек */
const SECTIONS=[
  {key:'local', ic:'monitor', label:()=>t('secLocal'), test:s=>!isBot(s)&&!isVps(s)},
  {key:'vps',   ic:'cloud',   label:()=>t('secVps'),   test:s=>!isBot(s)&&isVps(s)},
  {key:'bots',  ic:'bot',     label:()=>t('secBots'),  test:s=>isBot(s)},
];
/* сворачиваемые секции: состояние помним в localStorage */
const collapsed=new Set(JSON.parse(localStorage.getItem('lc-collapsed')||'[]'));
function toggleSection(key){ collapsed.has(key)?collapsed.delete(key):collapsed.add(key);
  localStorage.setItem('lc-collapsed',JSON.stringify([...collapsed]));
  if(key==='disc') renderDiscovered(_lastDisc); else { lastSig=''; render(); } }
function render(){ closeMenus(); const vis=visible(); let html='';
  for(const g of SECTIONS){ const items=vis.filter(g.test); if(!items.length)continue;
    const col=collapsed.has(g.key);
    html+=`<div class="section${col?' collapsed':''}" onclick="toggleSection('${g.key}')"><span class="seccaret">${icon('chevron')}</span>${icon(g.ic)} ${g.label()} <span class="secn">${items.length}</span></div>`
      + (col?'':items.map(card).join('')); }
  if(!html && !$('q').value.trim()) html=`<div class="empty"><div class="emptyt">${t('emptyTitle')}</div><div class="emptyh">${t('emptyHint')}</div></div>`;
  $('grid').innerHTML=html;
  openPrevs.forEach(n=>{ const w=document.querySelector(`[data-prev="${CSS.escape(n)}"]`); if(w){ w.classList.add('open'); buildPreviewContent(w,n); } else openPrevs.delete(n); });
  updateHeader(); }
function patch(){ visible().forEach(s=>{ const c=document.querySelector(`.card[data-name="${CSS.escape(s.name)}"]`); if(!c||isBot(s))return;
    const cls=s.up?'up':'down'; c.classList.toggle('up',s.up); c.classList.toggle('down',!s.up);
    const pl=c.querySelector('.pulse'); if(pl)pl.className='pulse '+cls;
    const st=c.querySelector('.state'); if(st){ st.className='state '+cls; st.textContent=s.up?t('working'):t('stopped'); }
    const tg=c.querySelector('.tgl'); if(tg){ tg.className='btn tgl '+(s.up?'btn-soft':'btn-primary'); tg.style.cssText=s.up?'--ic:var(--ic-stop)':'';
      tg.innerHTML=icon(s.up?'stop':'play')+' '+(s.up?t('stop'):t('start')); tg.onclick=()=>act(s.name,s.up?'stop':'start'); } }); updateHeader(); }
function animNum(el,to){ const from=+el.textContent||0; if(from===to)return; const d=600,t0=performance.now();
  const step=now=>{ const k=Math.min(1,(now-t0)/d); const e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    el.textContent=Math.round(from+(to-from)*e); if(k<1)requestAnimationFrame(step); }; requestAnimationFrame(step); }
function updateHeader(){ const up=DATA.filter(s=>s.up).length,tot=DATA.length;
  animNum($('upn'),up); $('totn').textContent=tot; $('upc').textContent=up; $('downc').textContent=tot-up;
  const C=214; $('arc').style.strokeDashoffset=tot?C-(C*up/tot):C; }

async function load(){ if(paused||document.hidden||_dragging)return;   // во время перетаскивания не перерисовываем
  try{ const r=await fetch('/api/status'); const j=await r.json(); DATA=j.services; authOn=j.authOn; DEVICE=j.device||'Local';
    ACCESS=j.access||'off'; TS_IP=j.tsIp||null; LAN_URL=j.lanUrl||null; SELF_TUNNEL=j.selfTunnel||null;
    $('ts').textContent=new Date(j.ts).toLocaleTimeString();
    const sig=DATA.map(s=>s.name+s.hasControls+(s.tunnelManaged?1:0)+(s.tunnel||'')+(s.keepAlive?1:0)).join('|')+'#'+$('q').value;
    if(sig!==lastSig){ lastSig=sig; render(); } else patch();
    renderDiscovered(j.discovered||[]);
    $('platwarn').style.display=(j.platform&&j.platform!=='darwin')?'block':'none';
    const stn=$('selftun'); if(j.selfTunnel){ stn.style.display='block'; stn.innerHTML=`${icon('cloud')} <b>${t('exposed')}</b> · <a href="${safeUrl(j.selfTunnel)}" target="_blank" rel="noopener" style="color:#9a6a00;word-break:break-all">${esc(j.selfTunnel)}</a> <button class="btn btn-soft" style="margin-left:8px;font-size:12px;padding:4px 10px" onclick="tunnelStop(7777)">${t('exposedOff')}</button>`; } else stn.style.display='none';
    if($('phoneModal') && $('phoneModal').classList.contains('show')) renderPhone();
    lvOnPoll();
  }catch(e){ $('ts').textContent='—'; } }

/* живой эффект: спотлайт за курсором на карточках + ambient-glow всей страницы */
let _raf=0,_e=null,_tilt=null,_dragging=false;
addEventListener('pointermove',e=>{ _e=e; if(_raf)return; _raf=requestAnimationFrame(()=>{ _raf=0; if(_dragging)return; const ev=_e;
  document.documentElement.style.setProperty('--gx',(ev.clientX/innerWidth*100).toFixed(1)+'%');
  document.documentElement.style.setProperty('--gy',(ev.clientY/innerHeight*100).toFixed(1)+'%');
  const c=ev.target.closest&&ev.target.closest('.card');
  if(c!==_tilt){ if(_tilt){ _tilt.style.setProperty('--rx','0deg'); _tilt.style.setProperty('--ry','0deg'); } _tilt=c; }
  if(c){ const r=c.getBoundingClientRect(); const mx=(ev.clientX-r.left)/r.width, my=(ev.clientY-r.top)/r.height;
    c.style.setProperty('--mx',(mx*100).toFixed(1)+'%'); c.style.setProperty('--my',(my*100).toFixed(1)+'%');
    c.style.setProperty('--ry',((mx-.5)*6.5).toFixed(2)+'deg'); c.style.setProperty('--rx',((.5-my)*6.5).toFixed(2)+'deg'); } }); },{passive:true});

if(!IS_LOCAL){ const pb=$('phonebtn'); if(pb) pb.style.display='none'; }   // с телефона доступ настраивать незачем
/* Live view — обработчики контролов */
$('lvcols')&&$('lvcols').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  [...$('lvcols').children].forEach(x=>x.classList.toggle('on',x===b));
  document.documentElement.style.setProperty('--lvcols',b.dataset.c);
  document.documentElement.style.setProperty('--lvtileh', b.dataset.c==='1'?'72vh':b.dataset.c==='2'?'430px':'320px'); });
$('lvzin')&&$('lvzin').addEventListener('click',()=>{ lvZoom=Math.min(1.5,+(lvZoom+0.1).toFixed(2)); lvApplyZoom(); });
$('lvzout')&&$('lvzout').addEventListener('click',()=>{ lvZoom=Math.max(0.4,+(lvZoom-0.1).toFixed(2)); lvApplyZoom(); });
$('lvpickbtn')&&$('lvpickbtn').addEventListener('click',e=>{ e.stopPropagation(); $('lvpick').classList.toggle('open'); });
document.addEventListener('click',e=>{ const p=$('lvpick'); if(p&&!p.contains(e.target)&&e.target!==$('lvpickbtn')&&!($('lvpickbtn')&&$('lvpickbtn').contains(e.target))) p.classList.remove('open'); });
document.addEventListener('fullscreenchange',()=>{ const l=$('lvfslbl'); if(l) l.textContent=document.fullscreenElement?t('lvExit'):t('lvFull'); });
lvApplyZoom();
$('pause').innerHTML=icon('pause'); fillLangs(); applyI18n(); toggleCmd(); setMode(MODE); load(); setInterval(load,3000);
</script>
